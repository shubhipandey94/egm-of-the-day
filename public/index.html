<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>EGM of the Day</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,500&family=JetBrains+Mono:wght@400;500;600;700&display=swap');
 
  :root{
    --ink-900:#0a0e14;
    --ink-800:#10161f;
    --ink-700:#171f2b;
    --ink-600:#222c3a;
    --line:#2a3544;
    --paper:#e8e6df;
    --paper-dim:#9aa3b0;
    --amber:#e8a23d;
    --amber-dim:#8a6326;
    --teal:#4fb6a8;
    --red:#d9685f;
    --radius:10px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--ink-900);
    color:var(--paper);
    font-family:'JetBrains Mono', monospace;
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
    padding-bottom:40px;
  }
  .scope{
    background-image:
      repeating-linear-gradient(0deg, rgba(255,255,255,0.025) 0px, rgba(255,255,255,0.025) 1px, transparent 1px, transparent 24px),
      repeating-linear-gradient(90deg, rgba(255,255,255,0.025) 0px, rgba(255,255,255,0.025) 1px, transparent 1px, transparent 24px);
  }
  a{color:inherit;}
  button{font-family:inherit;cursor:pointer;}
 
  header.top{
    position:sticky; top:0; z-index:20;
    background:rgba(10,14,20,0.92);
    backdrop-filter:blur(6px);
    border-bottom:1px solid var(--line);
    padding:14px 20px;
    display:flex; align-items:center; justify-content:space-between;
  }
  .brand{display:flex; align-items:baseline; gap:10px;}
  .brand .pulse{width:8px;height:8px;border-radius:50%;background:var(--amber);box-shadow:0 0 0 0 rgba(232,162,61,.6);animation:ping 2.2s infinite;}
  @keyframes ping{
    0%{box-shadow:0 0 0 0 rgba(232,162,61,.55);}
    70%{box-shadow:0 0 0 8px rgba(232,162,61,0);}
    100%{box-shadow:0 0 0 0 rgba(232,162,61,0);}
  }
  .brand h1{
    font-family:'Fraunces', serif;
    font-weight:600; font-size:18px; letter-spacing:0.2px; margin:0;
  }
  .brand .tag{font-size:10px; color:var(--paper-dim); letter-spacing:1.5px; text-transform:uppercase;}
  nav.tabs{display:flex; gap:4px;}
  nav.tabs button{
    background:transparent; border:1px solid transparent; color:var(--paper-dim);
    font-size:11px; letter-spacing:0.5px; text-transform:uppercase; padding:7px 12px; border-radius:7px;
  }
  nav.tabs button.active{background:var(--ink-700); color:var(--amber); border-color:var(--line);}
 
  main{max-width:640px; margin:0 auto; padding:20px 16px 0;}
 
  .case-meta{display:flex; justify-content:space-between; align-items:baseline; margin-bottom:14px;}
  .case-meta .eyebrow{font-size:11px; letter-spacing:1.5px; text-transform:uppercase; color:var(--amber-dim);}
  .case-meta .date{font-size:11px; color:var(--paper-dim);}
 
  .scope-card{
    background:var(--ink-800);
    border:1px solid var(--line);
    border-radius:var(--radius);
    overflow:hidden;
    margin-bottom:16px;
  }
  .scope-card img{display:block; width:100%; height:auto; background:#000;}
  .scope-card .img-empty{
    aspect-ratio:16/10; display:flex; align-items:center; justify-content:center;
    color:var(--paper-dim); font-size:12px; flex-direction:column; gap:8px;
  }
  .scope-card .caption{padding:10px 14px; font-size:11px; color:var(--paper-dim); border-top:1px solid var(--line);}
 
  .prompt-title{
    font-family:'Fraunces', serif; font-style:italic; font-weight:500;
    font-size:20px; line-height:1.4; margin:0 0 16px;
    color:var(--paper);
  }
 
  .guess-grid{display:grid; gap:8px; margin-bottom:18px;}
  .guess-opt{
    text-align:left; background:var(--ink-800); border:1px solid var(--line); color:var(--paper);
    padding:13px 14px; border-radius:8px; font-size:13.5px; display:flex; align-items:center; gap:10px;
    transition:border-color .15s, background .15s;
  }
  .guess-opt:hover{border-color:var(--amber-dim);}
  .guess-opt .letter{
    font-size:11px; color:var(--paper-dim); border:1px solid var(--line); border-radius:5px;
    width:20px; height:20px; display:flex; align-items:center; justify-content:center; flex-shrink:0;
  }
  .guess-opt.correct{border-color:var(--teal); background:rgba(79,182,168,0.08);}
  .guess-opt.correct .letter{border-color:var(--teal); color:var(--teal);}
  .guess-opt.incorrect{border-color:var(--red); background:rgba(217,104,95,0.07); opacity:0.75;}
  .guess-opt.incorrect .letter{border-color:var(--red); color:var(--red);}
  .guess-opt.pending{border-color:var(--amber); background:rgba(232,162,61,0.08);}
  .guess-opt.pending .letter{border-color:var(--amber); color:var(--amber);}
  .guess-opt:disabled{cursor:default;}
 
  .free-text{margin-bottom:18px;}
  .free-text textarea{
    width:100%; background:var(--ink-800); border:1px solid var(--line); border-radius:8px; color:var(--paper);
    font-family:'JetBrains Mono', monospace; font-size:13px; padding:12px; resize:vertical; min-height:70px;
  }
  .free-text button{
    margin-top:8px; background:var(--amber); color:var(--ink-900); border:none; font-weight:700;
    font-size:12px; letter-spacing:0.5px; text-transform:uppercase; padding:10px 18px; border-radius:7px;
  }
 
  .reveal-toggle{
    width:100%; background:var(--ink-700); border:1px dashed var(--line); color:var(--amber);
    padding:14px; border-radius:8px; font-size:12px; letter-spacing:1px; text-transform:uppercase;
    margin-bottom:18px; display:flex; align-items:center; justify-content:center; gap:8px;
  }
  .reveal-toggle .chev{transition:transform .2s;}
  .reveal-toggle.open .chev{transform:rotate(180deg);}
 
  .interp{
    border-left:2px solid var(--amber); padding-left:16px; margin-bottom:24px;
    animation:sweep .5s ease;
  }
  @keyframes sweep{from{opacity:0; transform:translateX(-6px);} to{opacity:1; transform:translateX(0);}}
  .interp h3{
    font-family:'Fraunces', serif; font-size:13px; letter-spacing:0.5px; text-transform:uppercase;
    color:var(--amber); margin:0 0 6px;
  }
  .interp p{font-size:13.5px; line-height:1.65; color:#d6d4cc; margin:0 0 16px;}
  .interp .citation{font-size:11px; color:var(--paper-dim); border-top:1px solid var(--line); padding-top:10px;}
 
  .comments{border-top:1px solid var(--line); padding-top:18px; margin-bottom:30px;}
  .comments h3{font-size:12px; letter-spacing:1px; text-transform:uppercase; color:var(--paper-dim); margin:0 0 12px;}
  .comment{background:var(--ink-800); border:1px solid var(--line); border-radius:8px; padding:10px 12px; margin-bottom:8px;}
  .comment .who{font-size:11px; color:var(--teal); margin-bottom:4px; display:flex; justify-content:space-between;}
  .comment .who .when{color:var(--paper-dim);}
  .comment .body{font-size:13px; line-height:1.5; color:var(--paper);}
  .comment-form{display:flex; gap:8px; margin-top:10px;}
  .comment-form input[type=text]{
    background:var(--ink-800); border:1px solid var(--line); border-radius:7px; color:var(--paper);
    padding:9px 10px; font-size:12px; font-family:inherit; width:90px; flex-shrink:0;
  }
  .comment-form textarea{
    flex:1; background:var(--ink-800); border:1px solid var(--line); border-radius:7px; color:var(--paper);
    padding:9px 10px; font-size:13px; font-family:inherit; resize:none; min-height:38px;
  }
  .comment-form button{
    background:var(--amber); color:var(--ink-900); border:none; border-radius:7px; padding:0 14px;
    font-weight:700; font-size:11px; text-transform:uppercase;
  }
 
  /* Archive */
  .archive-grid{display:grid; gap:10px; padding-bottom:30px;}
  .archive-item{
    background:var(--ink-800); border:1px solid var(--line); border-radius:9px; padding:13px 14px;
    display:flex; gap:12px; align-items:center;
  }
  .archive-item .thumb{
    width:54px; height:40px; border-radius:5px; background:#000; flex-shrink:0; overflow:hidden;
    display:flex; align-items:center; justify-content:center; border:1px solid var(--line);
  }
  .archive-item .thumb img{width:100%; height:100%; object-fit:cover;}
  .archive-item .meta-col{flex:1; min-width:0;}
  .archive-item .meta-col .t{font-family:'Fraunces',serif; font-style:italic; font-size:14px; color:var(--paper); margin:0 0 3px;}
  .archive-item .meta-col .d{font-size:10.5px; color:var(--paper-dim);}
  .archive-item .arrow{color:var(--paper-dim); font-size:14px;}
 
  /* Upload (post a case) */
  .form-block{margin-bottom:18px;}
  .form-block label{display:block; font-size:11px; letter-spacing:0.8px; text-transform:uppercase; color:var(--paper-dim); margin-bottom:6px;}
  .form-block input[type=text], .form-block input[type=date], .form-block textarea, .form-block select{
    width:100%; background:var(--ink-800); border:1px solid var(--line); border-radius:8px; color:var(--paper);
    padding:11px 12px; font-family:inherit; font-size:13px;
  }
  .form-block textarea{resize:vertical; min-height:70px;}
  .form-row{display:grid; grid-template-columns:1fr 1fr; gap:10px;}
  .opt-row{display:flex; gap:8px; margin-bottom:8px; align-items:center;}
  .opt-row input[type=text]{flex:1;}
  .opt-row input[type=radio]{width:18px; height:18px; accent-color:var(--amber);}
  .add-opt{background:transparent; border:1px dashed var(--line); color:var(--paper-dim); border-radius:7px; padding:8px; font-size:11px; width:100%; margin-bottom:14px;}
  .upload-zone{
    border:1px dashed var(--line); border-radius:9px; padding:24px; text-align:center; color:var(--paper-dim);
    font-size:12px; margin-bottom:6px; cursor:pointer; position:relative;
  }
  .upload-zone.has-img{padding:0; border-style:solid;}
  .upload-zone img{width:100%; border-radius:9px; display:block;}
  .upload-zone input[type=file]{position:absolute; inset:0; opacity:0; cursor:pointer;}
  .publish-btn{
    width:100%; background:var(--amber); color:var(--ink-900); border:none; border-radius:9px; padding:14px;
    font-weight:700; font-size:13px; letter-spacing:0.5px; text-transform:uppercase; margin-top:6px;
  }
  .publish-btn:disabled{opacity:0.4;}
  .hint{font-size:11px; color:var(--paper-dim); line-height:1.5; margin-top:-2px; margin-bottom:14px;}
 
  .empty-state{text-align:center; padding:60px 20px; color:var(--paper-dim);}
  .empty-state .big{font-family:'Fraunces',serif; font-style:italic; font-size:18px; color:var(--paper); margin-bottom:8px;}
  .empty-state .small{font-size:12px; line-height:1.6;}
 
  .toast{
    position:fixed; bottom:20px; left:50%; transform:translateX(-50%);
    background:var(--ink-700); border:1px solid var(--amber-dim); color:var(--amber);
    padding:10px 18px; border-radius:8px; font-size:12px; z-index:50; opacity:0; transition:opacity .25s;
  }
  .toast.show{opacity:1;}
 
  .name-gate{
    display:flex; min-height:100vh; align-items:center; justify-content:center; padding:20px;
  }
  .name-gate .box{max-width:340px; width:100%; text-align:center;}
  .name-gate h2{font-family:'Fraunces',serif; font-style:italic; font-size:22px; margin-bottom:8px;}
  .name-gate p{font-size:12px; color:var(--paper-dim); margin-bottom:18px; line-height:1.6;}
  .name-gate input{
    width:100%; background:var(--ink-800); border:1px solid var(--line); border-radius:8px; color:var(--paper);
    padding:12px; font-size:13px; text-align:center; margin-bottom:10px; font-family:inherit;
  }
  .name-gate button{
    width:100%; background:var(--amber); color:var(--ink-900); border:none; border-radius:8px; padding:12px;
    font-weight:700; font-size:12px; text-transform:uppercase;
  }
 
  ::selection{background:var(--amber-dim);}
  :focus-visible{outline:2px solid var(--amber); outline-offset:2px;}
 
  @media (prefers-reduced-motion: reduce){
    *{animation:none !important; transition:none !important;}
  }
</style>
</head>
<body class="scope">
<div id="gate" class="name-gate" style="display:none;">
  <div class="box">
    <h2>EGM of the Day</h2>
    <p>Daily practice, one tracing at a time.<br>What's your name, for comments?</p>
    <input id="gateName" type="text" placeholder="Your name">
    <button id="gateBtn">Enter</button>
  </div>
</div>
 
<div id="app" style="display:none;">
<header class="top">
  <div class="brand">
    <span class="pulse"></span>
    <div>
      <h1>EGM of the Day</h1>
      <div class="tag">case archive</div>
    </div>
  </div>
  <nav class="tabs">
    <button data-tab="today" class="active">Today</button>
    <button data-tab="archive">Archive</button>
    <button data-tab="post">Post</button>
  </nav>
</header>
 
<main>
  <section id="tab-today"></section>
  <section id="tab-archive" style="display:none;"></section>
  <section id="tab-post" style="display:none;"></section>
</main>
</div>
 
<div id="toast" class="toast"></div>
 
<script>
(function(){
  const STORAGE_CASES_KEY = 'egm:cases-index'; // legacy key — kept for migration
  const STORAGE_IDS_KEY = 'egm:cases-ids';    // new: just the list of IDs
  const STORAGE_PASSCODE_KEY = 'egm:post-passcode';
  const SHARED = true;
  let userName = '';
  let postPasscode = null; // null = no passcode set yet (open posting)
  let postUnlocked = false; // unlocked for this session once correct code entered
  let previewDraftId = null; // set when previewing a draft from the Post tab
  let cases = []; // [{id, date, title, image(base64), options:[{label,correct}], free, interp:{mechanism,evidence,management}, citation, comments:[]}]
  let currentTab = 'today';
  let currentCaseId = null;
 
  function toast(msg){
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(()=>t.classList.remove('show'), 2200);
  }
 
  function uid(){ return 'c_' + Date.now() + '_' + Math.random().toString(36).slice(2,7); }
 
  // ---------- streak ----------
  const STREAK_WINDOW_MS = 72 * 60 * 60 * 1000; // 72 hours
 
  function getAnsweredIds(){
    try{ return JSON.parse(localStorage.getItem('egm:answered') || '[]'); }catch(e){ return []; }
  }
  function recordAnswered(caseId){
    const ids = getAnsweredIds();
    if(!ids.includes(caseId)){ ids.push(caseId); localStorage.setItem('egm:answered', JSON.stringify(ids)); }
  }
  function casePostedAt(c){
    // treat date as start of day in local time
    return new Date(c.date + 'T00:00:00').getTime();
  }
  function isWithinWindow(c){
    return Date.now() - casePostedAt(c) <= STREAK_WINDOW_MS;
  }
  function computeStreak(){
    const answeredIds = new Set(getAnsweredIds());
    const now = Date.now();
    const liveCases = cases.filter(isLive).sort((a,b)=> casePostedAt(a)-casePostedAt(b));
    let streak = 0;
    for(let i = liveCases.length-1; i >= 0; i--){
      const c = liveCases[i];
      const postedAt = casePostedAt(c);
      const withinWindow = (now - postedAt) <= STREAK_WINDOW_MS;
      if(answeredIds.has(c.id)){
        streak++;
      } else if(!withinWindow){
        // missed this case and window has passed — streak breaks here
        break;
      }
      // if within window and not answered yet, don't break — still has time
    }
    return streak;
  }
  function getStreakAtRiskCase(){
    // find the most recent unanswered case that is within the 72hr window
    // but has been posted for more than 24hrs (so we don't nag immediately)
    const answeredIds = new Set(getAnsweredIds());
    const liveCases = cases.filter(isLive).sort((a,b)=> casePostedAt(b)-casePostedAt(a));
    for(const c of liveCases){
      const age = Date.now() - casePostedAt(c);
      if(!answeredIds.has(c.id) && isWithinWindow(c) && age > 24 * 60 * 60 * 1000) return c;
    }
    return null;
  }
  function fmtDeadline(c){
    const deadline = new Date(casePostedAt(c) + STREAK_WINDOW_MS);
    return deadline.toLocaleDateString(undefined,{month:'short',day:'numeric'}) + ' at ' + deadline.toLocaleTimeString(undefined,{hour:'numeric',minute:'2-digit'});
  }
 
  // ---------- difficulty ----------
  function getMyDifficultyVote(caseId){
    try{ return JSON.parse(localStorage.getItem('egm:diff') || '{}')[caseId] || null; }catch(e){ return null; }
  }
  function recordDifficultyVote(caseId, rating){
    try{
      const d = JSON.parse(localStorage.getItem('egm:diff') || '{}');
      d[caseId] = rating;
      localStorage.setItem('egm:diff', JSON.stringify(d));
    }catch(e){}
  }
  function difficultyAverage(ratings){
    if(!ratings || Object.keys(ratings).length === 0) return null;
    const map = {easy:1, medium:2, hard:3};
    const rmap = ['','Easy','Medium','Hard'];
    const vals = Object.values(ratings).map(r=>map[r]).filter(Boolean);
    if(!vals.length) return null;
    const avg = vals.reduce((a,b)=>a+b,0)/vals.length;
    return rmap[Math.round(avg)];
  }
  // Drop-in replacement for Claude's window.storage API, backed by Cloudflare D1
  // via /api/storage for shared data, and plain localStorage for personal
  // (non-shared) data like the remembered display name.
  window.storage = {
    async get(key, shared){
      if(!shared){
        const v = localStorage.getItem('egmlocal:' + key);
        if(v === null) return null;
        return { key, value: v, shared: false };
      }
      const res = await fetch('/api/storage?key=' + encodeURIComponent(key));
      if(res.status === 404) return null;
      if(!res.ok) throw new Error('storage get failed');
      const data = await res.json();
      return { key: data.key, value: data.value, shared: true };
    },
    async set(key, value, shared){
      if(!shared){
        localStorage.setItem('egmlocal:' + key, value);
        return { key, value, shared: false };
      }
      console.log('[storage] set', key, 'length:', value.length);
      const res = await fetch('/api/storage', {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({key, value})
      });
      console.log('[storage] set response status:', res.status);
      if(!res.ok){
        const text = await res.text();
        console.error('[storage] set error:', text);
        return null;
      }
      const data = await res.json();
      console.log('[storage] set success:', data.key);
      return { key: data.key, value: data.value, shared: true };
    },
    async delete(key, shared){
      if(!shared){
        localStorage.removeItem('egmlocal:' + key);
        return { key, deleted:true, shared:false };
      }
      const res = await fetch('/api/storage?key=' + encodeURIComponent(key), { method:'DELETE' });
      if(!res.ok) return null;
      return await res.json();
    },
    async list(prefix, shared){
      if(!shared){
        const keys = Object.keys(localStorage)
          .filter(k=>k.startsWith('egmlocal:' + (prefix||'')))
          .map(k=>k.replace('egmlocal:',''));
        return { keys, prefix, shared:false };
      }
      const res = await fetch('/api/storage/list?prefix=' + encodeURIComponent(prefix||''));
      if(!res.ok) return null;
      const data = await res.json();
      return { keys: data.keys, prefix, shared:true };
    }
  };
 
  // ---------- storage ----------
  async function loadCases(){
    try{
      // Try new per-case format first
      const idsRes = await window.storage.get(STORAGE_IDS_KEY, SHARED);
      if(idsRes && idsRes.value){
        const ids = JSON.parse(idsRes.value);
        const loaded = [];
        for(const id of ids){
          try{
            const r = await window.storage.get('egm:case:' + id, SHARED);
            if(r && r.value) loaded.push(JSON.parse(r.value));
          }catch(e){}
        }
        cases = loaded;
      } else {
        // Fall back to legacy single-blob format and migrate
        const res = await window.storage.get(STORAGE_CASES_KEY, SHARED);
        if(res && res.value){
          cases = JSON.parse(res.value);
          // Migrate to per-case format immediately
          console.log('[migrate] migrating', cases.length, 'cases to per-case storage');
          await saveCases();
          // Delete old blob after successful migration
          try{ await window.storage.delete(STORAGE_CASES_KEY, SHARED); }catch(e){}
          console.log('[migrate] migration complete');
        } else {
          cases = [];
        }
      }
    }catch(e){
      console.error('[loadCases] error:', e);
      cases = [];
    }
    cases.sort((a,b)=> new Date(b.date) - new Date(a.date));
  }
  async function saveCases(){
    try{
      // Save each case individually — avoids D1 1MB row limit
      const ids = cases.map(c => c.id);
      const idsR = await window.storage.set(STORAGE_IDS_KEY, JSON.stringify(ids), SHARED);
      if(!idsR){ toast('Save failed — try again'); return false; }
      let failed = 0;
      for(const c of cases){
        try{
          const r = await window.storage.set('egm:case:' + c.id, JSON.stringify(c), SHARED);
          if(!r) failed++;
        }catch(e){ failed++; console.error('[saveCases] case save error:', e); }
      }
      if(failed > 0){ toast('Save failed for ' + failed + ' case(s) — try again'); return false; }
      // Clean up deleted cases from DB
      try{
        const allKeys = await window.storage.list('egm:case:', SHARED);
        if(allKeys && allKeys.keys){
          const currentIds = new Set(ids);
          for(const key of allKeys.keys){
            const id = key.replace('egm:case:', '');
            if(!currentIds.has(id)) await window.storage.delete(key, SHARED);
          }
        }
      }catch(e){}
      return true;
    }catch(e){
      console.error('[saveCases] error:', e);
      toast('Save failed — try again');
      return false;
    }
  }
 
  function promptBackup(){
    const payload = {exportedAt:new Date().toISOString(),app:'EGM of the Day',caseCount:cases.length,cases};
    const blob = new Blob([JSON.stringify(payload,null,2)],{type:'application/json'});
    const url = URL.createObjectURL(blob);
    const stamp = todayStr();
    const t = document.createElement('div');

  async function loadPasscode(){
    try{
      const res = await window.storage.get(STORAGE_PASSCODE_KEY, SHARED);
      postPasscode = res ? res.value : null;
    }catch(e){
      postPasscode = null;
    }
  }
  async function savePasscode(code){
    try{
      const r = await window.storage.set(STORAGE_PASSCODE_KEY, code, SHARED);
      if(!r) toast('Could not save passcode — try again');
      else postPasscode = code;
    }catch(e){
      toast('Could not save passcode — try again');
    }
  }
 
  function fmtDate(d){
    const dt = new Date(d + 'T00:00:00');
    return dt.toLocaleDateString(undefined,{month:'short', day:'numeric', year:'numeric'});
  }
  function fmtWhen(ts){
    const dt = new Date(ts);
    return dt.toLocaleDateString(undefined,{month:'short', day:'numeric'}) + ' · ' + dt.toLocaleTimeString(undefined,{hour:'numeric',minute:'2-digit'});
  }
 
  // ---------- render: today ----------
  function isLive(c){ return !c.status || c.status === 'live'; }
 
  function pickTodaysCase(){
    if(cases.length === 0) return null;
    const today = todayStr();
    let live = cases.filter(isLive);
    let exact = live.find(c => c.date === today);
    if(exact) return exact;
    // most recent past case
    let past = live.filter(c => c.date <= today);
    if(past.length) return past[0];
    return live[live.length-1] || null;
  }
 
  function todayStr(){
    const d = new Date();
    return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
  }
  function interpAvailable(c){
    const i = c.interp || {};
    const hasContent = !!(i.text || i.mechanism || i.evidence || i.management);
    if(!hasContent) return false;
    if(!c.interpDate) return true;
    // if interpDate is same as or before the posting date, treat as immediately available
    if(c.interpDate <= c.date) return true;
    return c.interpDate <= todayStr();
  }
 
  function renderToday(){
    const el = document.getElementById('tab-today');
    const isPreviewing = previewDraftId !== null;
    const c = currentCaseId ? cases.find(x=>x.id===currentCaseId) : pickTodaysCase();
    if(!c || (!isLive(c) && !isPreviewing)){
      el.innerHTML = `<div class="empty-state">
        <div class="big">No cases yet</div>
        <div class="small">Post the first EGM from the "Post" tab —<br>it'll show up here for the group.</div>
      </div>`;
      return;
    }
    currentCaseId = c.id;
    const hasOptions = c.options && c.options.length > 0;
    const answered = c._answeredOption !== undefined;
    const revealed = !!c._revealed;
    const available = interpAvailable(c);
 
    const previewBanner = isPreviewing ? `
      <div style="background:var(--amber-dim); border-radius:8px; padding:10px 14px; margin-bottom:14px; display:flex; align-items:center; justify-content:space-between;">
        <span style="font-size:11px; letter-spacing:0.5px; text-transform:uppercase; color:var(--amber);">Preview mode — not visible to viewers</span>
        <button id="exitPreview" style="background:transparent; border:1px solid var(--amber-dim); color:var(--amber); font-size:11px; padding:5px 10px; border-radius:6px; cursor:pointer;">← Back to drafts</button>
      </div>
    ` : '';
 
    let optionsHtml = '';
    if(hasOptions){
      const votes = c.votes || {};
      const totalVotes = Object.values(votes).reduce((a,b)=>a+b, 0);
      const pending = c._pendingOption;
      optionsHtml = `<div class="guess-grid" id="optGrid">` + c.options.map((o,i)=>{
        let cls = 'guess-opt';
        if(answered && (revealed || available)){
          if(o.correct) cls += ' correct';
          else if(i === c._answeredOption) cls += ' incorrect';
        } else if(!answered && pending === i){
          cls += ' pending';
        } else if(answered && !revealed && !available && i === c._answeredOption){
          cls += ' pending'; // keep submitted choice highlighted until reveal
        }
        const voteCount = votes[i] || 0;
        const pct = totalVotes > 0 ? Math.round((voteCount / totalVotes) * 100) : 0;
        const showStats = revealed && answered && totalVotes > 0;
        return `<button class="${cls}" data-idx="${i}" ${answered?'disabled':''} style="position:relative; overflow:hidden;">
          ${showStats ? `<span style="position:absolute; left:0; top:0; bottom:0; width:${pct}%; background:${o.correct ? 'rgba(79,182,168,0.15)' : 'rgba(255,255,255,0.04)'}; transition:width .6s ease;"></span>` : ''}
          <span class="letter" style="position:relative;">${String.fromCharCode(65+i)}</span>
          <span style="position:relative; flex:1;">${escapeHtml(o.label)}</span>
          ${showStats ? `<span style="position:relative; font-size:11px; color:${o.correct ? 'var(--teal)' : 'var(--paper-dim)'}; margin-left:8px; flex-shrink:0;">${pct}%</span>` : ''}
        </button>`;
      }).join('') + `</div>`;
      if(!answered && pending !== undefined){

    }
 
    const streak = !isPreviewing ? computeStreak() : 0;
    const myDiffVote = getMyDifficultyVote(c.id);
    const diffAvg = difficultyAverage(c.diffRatings);
    const atRiskCase = !isPreviewing ? getStreakAtRiskCase() : null;
    const showStreakBanner = atRiskCase && !sessionStorage.getItem('egm:streak-banner-dismissed-' + atRiskCase.id);
 
    const streakBanner = showStreakBanner ? `
      <div id="streakBanner" style="background:rgba(232,162,61,0.12); border:1px solid var(--amber-dim); border-radius:8px; padding:10px 14px; margin-bottom:14px; display:flex; align-items:flex-start; justify-content:space-between; gap:10px;">
        <span style="font-size:12px; color:var(--amber); line-height:1.6;">🔥 There's an unanswered case from ${fmtDate(atRiskCase.date)}. Go to Archive to answer it by ${fmtDeadline(atRiskCase)} to keep your streak alive.</span>

    el.innerHTML = `

          ${streak > 0 ? `<span style="font-size:12px; color:var(--amber);">🔥 ${streak}</span>` : ''}

      </div>
      <div class="scope-card" ${!c.image ? 'style="display:none;"' : ''}>

      ${optionsHtml}
      ${(!hasOptions) ? `

      ${revealBtnHtml}

      <div id="diffBlock"></div>
      <div class="comments">
        <h3>Discussion (${(c.comments||[]).length})</h3>

    `;
 
    if(isPreviewing){
      el.querySelector('#exitPreview').addEventListener('click', ()=>{
        previewDraftId = null;

    if(showStreakBanner){

        sessionStorage.setItem('egm:streak-banner-dismissed-' + atRiskCase.id, '1');
        el.querySelector('#streakBanner').remove();
      });
    }
 
    if(hasOptions){
      el.querySelectorAll('.guess-opt').forEach(btn=>{
        btn.addEventListener('click', ()=>{
          if(c._answeredOption !== undefined) return;
          c._pendingOption = parseInt(btn.dataset.idx);
          renderToday();
        });
      });
      const submitBtn = el.querySelector('#submitAnswer');
      if(submitBtn){
        submitBtn.addEventListener('click', async ()=>{
          if(c._answeredOption !== undefined || c._pendingOption === undefined) return;
          const idx = c._pendingOption;
          c._answeredOption = idx;
          delete c._pendingOption;
          if(!isPreviewing){
            // only record real votes outside preview mode
            c.votes = c.votes || {};
            c.votes[idx] = (c.votes[idx] || 0) + 1;
            if(interpAvailable(c)) c._revealed = true;
            recordAnswered(c.id);
            await saveCases();
          } else {
            if(interpAvailable(c)) c._revealed = true;
          }
          renderToday();

      }
    } else {
      const fs = el.querySelector('#freeSubmit');

        renderToday();
      });

    renderInterp();
    renderDiff();
 
    if(available){

        c._revealed = !c._revealed;
        renderToday();
      });
    }
 
    renderComments();
    el.querySelector('#cSend').addEventListener('click', async ()=>{
      const nameInput = el.querySelector('#cName').value.trim();
      const body = el.querySelector('#cBody').value.trim();
      if(!body) return;
      userName = nameInput || userName || 'Anonymous';
      c.comments = c.comments || [];

    function renderInterp(){
      const block = el.querySelector('#interpBlock');

      const i = c.interp || {};
      const hasInterpContent = !!(i.text || i.mechanism || i.evidence || i.management || i.image);
      if(!hasInterpContent){ block.innerHTML=''; renderDiff(); return; }
      block.innerHTML = `
        <div class="interp">
          ${(i.text || i.mechanism || i.evidence || i.management) ? `<p style="white-space:pre-wrap;">${escapeHtml(i.text || [i.mechanism, i.evidence, i.management].filter(Boolean).join('\n\n'))}</p>` : ''}
          ${i.image ? `<div style="margin:0 0 16px; border:1px solid var(--line); border-radius:8px; overflow:hidden;"><img src="${i.image}" style="display:block; width:100%; height:auto;" alt="Interpretation tracing"></div>` : ''}
          ${(()=>{
            const links = c.links || (c.link ? [{label:'', url:c.link}] : []);
            const linksHtml = links.filter(l=>l.url).map(l=>
              `<a href="${escapeHtml(l.url)}" target="_blank" rel="noopener" style="color:var(--amber); display:inline-block; margin-right:12px;">${escapeHtml(l.label||'View reference')} ↗</a>`
            ).join('');
            if(c.citation && linksHtml) return `<div class="citation">Source / citation: ${escapeHtml(c.citation)}<br>${linksHtml}</div>`;
            if(c.citation) return `<div class="citation">Source / citation: ${escapeHtml(c.citation)}</div>`;
            if(linksHtml) return `<div class="citation">${linksHtml}</div>`;
            return '';
          })()}
        </div>
      `;
      renderDiff();
    }
 
    function shouldShowDiff(){
      if(isPreviewing) return false;
      if(hasOptions) return false; // multiple choice uses vote percentages instead

    }
 
    function renderDiff(){
      const block = el.querySelector('#diffBlock');
      if(!block) return;
      if(!shouldShowDiff()){ block.innerHTML=''; return; }
      const myVote = getMyDifficultyVote(c.id);
      const avg = difficultyAverage(c.diffRatings);
      const total = c.diffRatings ? Object.keys(c.diffRatings).length : 0;
      const diffColors = {Easy:'var(--teal)', Medium:'var(--amber)', Hard:'var(--red)'};
      const btnStyle = (rating) => {
        const active = myVote === rating.toLowerCase();
        return 'padding:8px 16px; border-radius:7px; font-size:12px; font-family:inherit; cursor:pointer; ' +
          'border:1px solid ' + (active ? diffColors[rating] : 'var(--line)') + '; ' +
          'background:' + (active ? 'rgba(0,0,0,0.2)' : 'var(--ink-800)') + '; ' +
          'color:' + (active ? diffColors[rating] : 'var(--paper-dim)') + ';';
      };

          const key = (userName||'anon') + ':' + c.id;
          c.diffRatings[key] = rating;
          recordDifficultyVote(c.id, rating);
          await saveCases();
          renderDiff();
        });
      });

    function renderComments(){

        </div>
      `).join('');
    }
  }

  function buildLinksUI(containerId, existingLinks){
    const links = existingLinks && existingLinks.length ? existingLinks : [{label:'', url:''}];
    const rowStyle = 'display:flex; gap:6px; margin-bottom:8px; align-items:center;';
    const inputBase = 'background:var(--ink-800); border:1px solid var(--line); border-radius:7px; color:var(--paper); padding:9px 10px; font-family:inherit; font-size:12px; min-width:0;';
    const labelStyle = inputBase + 'width:28%;';
    const urlStyle = inputBase + 'flex:1;';
    const btnStyle = 'padding:0 8px; height:34px; color:var(--red); border-color:var(--red); flex-shrink:0; width:32px;';
    let rows = '';
    for(let i=0; i<links.length; i++){
      rows += '<div class="link-row" style="' + rowStyle + '">' +
        '<input type="text" class="link-label" placeholder="Label" value="' + escapeHtml(links[i].label||'') + '" style="' + labelStyle + '">' +
        '<input type="text" class="link-url" placeholder="https://..." value="' + escapeHtml(links[i].url||'') + '" style="' + urlStyle + '">' +
        '<button class="remove-link add-opt" style="' + btnStyle + '">\u2715</button>' +
        '</div>';
    }
    return '<div id="' + containerId + '">' + rows + '</div>' +
      '<button class="add-opt add-link-btn" style="width:100%; margin-bottom:6px;">+ Add another link</button>';
  }
 
  function wireLinksUI(formBlock){
    const wrap = formBlock.querySelector('[id$="LinksWrap"]');
    const inputBase = 'background:var(--ink-800); border:1px solid var(--line); border-radius:7px; color:var(--paper); padding:9px 10px; font-family:inherit; font-size:12px; min-width:0;';
    const labelStyle = inputBase + 'width:28%;';
    const urlStyle = inputBase + 'flex:1;';
    const btnStyle = 'padding:0 8px; height:34px; color:var(--red); border-color:var(--red); flex-shrink:0; width:32px;';
    formBlock.querySelector('.add-link-btn').addEventListener('click', ()=>{
      const row = document.createElement('div');
      row.className = 'link-row';
      row.style.cssText = 'display:flex; gap:6px; margin-bottom:8px; align-items:center;';
      row.innerHTML = '<input type="text" class="link-label" placeholder="Label" style="' + labelStyle + '">' +
        '<input type="text" class="link-url" placeholder="https://..." style="' + urlStyle + '">' +
        '<button class="remove-link add-opt" style="' + btnStyle + '">\u2715</button>';
      wrap.appendChild(row);
      row.querySelector('.remove-link').addEventListener('click', ()=> row.remove());
    });
    wrap.querySelectorAll('.remove-link').forEach(btn=>{
      btn.addEventListener('click', ()=> btn.closest('.link-row').remove());
    });
  }
 
  function collectLinks(wrap){
    return [...wrap.querySelectorAll('.link-row')].map(row=>({
      label: row.querySelector('.link-label').value.trim(),
      url: row.querySelector('.link-url').value.trim(),
    })).filter(l=>l.url);
  }
  function escapeHtml(s){
    if(!s) return '';
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
 
  function convertToJpeg(file){
    return new Promise((resolve)=>{
      // Detect HEIC by MIME type or file extension
      const isHeic = file.type === 'image/heic' || file.type === 'image/heif' ||
                     file.name.toLowerCase().endsWith('.heic') || file.name.toLowerCase().endsWith('.heif');
 
      const reader = new FileReader();
      reader.onload = ()=>{
        const dataUrl = reader.result;
        // Try canvas conversion via blob URL (most reliable cross-browser path)
        const byteStr = atob(dataUrl.split(',')[1]);
        const ab = new ArrayBuffer(byteStr.length);
        const ia = new Uint8Array(ab);
        for(let i=0;i<byteStr.length;i++) ia[i]=byteStr.charCodeAt(i);
        const blob = new Blob([ab], {type: file.type || 'image/jpeg'});
        const blobUrl = URL.createObjectURL(blob);
        const img = new Image();
        img.onload = ()=>{
          try{
            const canvas = document.createElement('canvas');
            canvas.width = img.naturalWidth;
            canvas.height = img.naturalHeight;
            if(canvas.width === 0 || canvas.height === 0){
              URL.revokeObjectURL(blobUrl);
              if(isHeic) toast('⚠ HEIC detected — please export as JPEG from Photos first');
              resolve(dataUrl);
              return;
            }
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#000';
            ctx.fillRect(0,0,canvas.width,canvas.height);
            ctx.drawImage(img,0,0);
            const jpeg = canvas.toDataURL('image/jpeg', 0.92);
            URL.revokeObjectURL(blobUrl);
            resolve(jpeg.length > 5000 ? jpeg : dataUrl);
          }catch(e){
            URL.revokeObjectURL(blobUrl);
            if(isHeic) toast('⚠ HEIC detected — please export as JPEG from Photos first');
            resolve(dataUrl);
          }
        };
        img.onerror = ()=>{
          URL.revokeObjectURL(blobUrl);
          if(isHeic) toast('⚠ HEIC image could not be converted — export as JPEG from Photos first');
          resolve(dataUrl);
        };
        img.src = blobUrl;
      };
      reader.readAsDataURL(file);
    });
  }
 
  function downloadBackup(){
    try{
      const payload = {
        exportedAt: new Date().toISOString(),
        app: 'EGM of the Day',
        caseCount: cases.length,
        cases: cases
      };
      const blob = new Blob([JSON.stringify(payload, null, 2)], {type:'application/json'});
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      const stamp = todayStr();
      a.href = url;
      a.download = `egm-backup-${stamp}.json`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      setTimeout(()=>URL.revokeObjectURL(url), 2000);
      toast(`Backup saved — ${cases.length} case${cases.length===1?'':'s'}`);
    }catch(e){
      toast('Backup failed — try again');
    }
  }
 
  function importBackupFile(file, onDone){
    if(!file) return;
    const reader = new FileReader();
    reader.onload = async ()=>{
      try{
        const parsed = JSON.parse(reader.result);
        const incoming = Array.isArray(parsed) ? parsed : parsed.cases;
        if(!Array.isArray(incoming)) throw new Error('No cases array found in file');
        const existingIds = new Set(cases.map(c=>c.id));
        let added = 0, skipped = 0;
        incoming.forEach(c=>{
          if(c && c.id && !existingIds.has(c.id)){
            cases.push(c);
            existingIds.add(c.id);
            added++;
          } else {
            skipped++;
          }
        });
        cases.sort((a,b)=> new Date(b.date) - new Date(a.date));
        await saveCases();
        toast(`Imported ${added} case${added===1?'':'s'}${skipped?`, skipped ${skipped} duplicate${skipped===1?'':'s'}`:''}`);
        if(onDone) onDone();
      }catch(e){
        toast('Import failed — not a valid backup file');
      }
    };
    reader.readAsText(file);
  }
 
  function switchTab(tab){
    currentTab = tab;
    // clear preview state when user manually navigates away from Today
    if(tab !== 'today') previewDraftId = null;
    document.querySelectorAll('nav.tabs button').forEach(b=>b.classList.toggle('active', b.dataset.tab===tab));
    document.getElementById('tab-today').style.display = tab==='today' ? 'block':'none';
    document.getElementById('tab-archive').style.display = tab==='archive' ? 'block':'none';
    document.getElementById('tab-post').style.display = tab==='post' ? 'block':'none';
    if(tab==='today') renderToday();
    if(tab==='archive') renderArchive();
    if(tab==='post') renderPost();
  }
 
  document.querySelectorAll('nav.tabs button').forEach(b=>{
    b.addEventListener('click', ()=> switchTab(b.dataset.tab));
  });
 
  // ---------- name gate ----------
  async function init(){
    try{
      const saved = await window.storage.get('egm:username', false);
      if(saved && saved.value){
        userName = saved.value;
      }
    }catch(e){}
    await loadCases();
    await loadPasscode();
    if(userName){
      document.getElementById('gate').style.display='none';
      document.getElementById('app').style.display='block';
      switchTab('today');
    } else {
      document.getElementById('gate').style.display='flex';
    }
  }
 
  document.getElementById('gateBtn').addEventListener('click', async ()=>{
    const v = document.getElementById('gateName').value.trim();
    userName = v || 'Anonymous';
    try{ await window.storage.set('egm:username', userName, false); }catch(e){}
    document.getElementById('gate').style.display='none';
    document.getElementById('app').style.display='block';
    switchTab('today');
  });
  document.getElementById('gateName').addEventListener('keydown', (e)=>{
    if(e.key==='Enter') document.getElementById('gateBtn').click();
  });
 
  init();
})();
</script>
