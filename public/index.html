<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>EGM of the Day</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,500&family=JetBrains+Mono:wght@400;500;600;700&display=swap');
 
  :root{
    --ink-900:#0a0e14;
    --ink-800:#10161f;
    --ink-700:#171f2b;
    --ink-600:#222c3a;
    --line:#2a3544;
    --paper:#e8e6df;
    --paper-dim:#9aa3b0;
    --amber:#e8a23d;
    --amber-dim:#8a6326;
    --teal:#4fb6a8;
    --red:#d9685f;
    --radius:10px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--ink-900);
    color:var(--paper);
    font-family:'JetBrains Mono', monospace;
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
    padding-bottom:40px;
  }
  .scope{
    background-image:
      repeating-linear-gradient(0deg, rgba(255,255,255,0.025) 0px, rgba(255,255,255,0.025) 1px, transparent 1px, transparent 24px),
      repeating-linear-gradient(90deg, rgba(255,255,255,0.025) 0px, rgba(255,255,255,0.025) 1px, transparent 1px, transparent 24px);
  }
  a{color:inherit;}
  button{font-family:inherit;cursor:pointer;}
 
  header.top{
    position:sticky; top:0; z-index:20;
    background:rgba(10,14,20,0.92);
    backdrop-filter:blur(6px);
    border-bottom:1px solid var(--line);
    padding:14px 20px;
    display:flex; align-items:center; justify-content:space-between;
  }
  .brand{display:flex; align-items:baseline; gap:10px;}
  .brand .pulse{width:8px;height:8px;border-radius:50%;background:var(--amber);box-shadow:0 0 0 0 rgba(232,162,61,.6);animation:ping 2.2s infinite;}
  @keyframes ping{
    0%{box-shadow:0 0 0 0 rgba(232,162,61,.55);}
    70%{box-shadow:0 0 0 8px rgba(232,162,61,0);}
    100%{box-shadow:0 0 0 0 rgba(232,162,61,0);}
  }
  .brand h1{
    font-family:'Fraunces', serif;
    font-weight:600; font-size:18px; letter-spacing:0.2px; margin:0;
  }
  .brand .tag{font-size:10px; color:var(--paper-dim); letter-spacing:1.5px; text-transform:uppercase;}
  nav.tabs{display:flex; gap:4px;}
  nav.tabs button{
    background:transparent; border:1px solid transparent; color:var(--paper-dim);
    font-size:11px; letter-spacing:0.5px; text-transform:uppercase; padding:7px 12px; border-radius:7px;
  }
  nav.tabs button.active{background:var(--ink-700); color:var(--amber); border-color:var(--line);}
 
  main{max-width:640px; margin:0 auto; padding:20px 16px 0;}
 
  .case-meta{display:flex; justify-content:space-between; align-items:baseline; margin-bottom:14px;}
  .case-meta .eyebrow{font-size:11px; letter-spacing:1.5px; text-transform:uppercase; color:var(--amber-dim);}
  .case-meta .date{font-size:11px; color:var(--paper-dim);}
 
  .scope-card{
    background:var(--ink-800);
    border:1px solid var(--line);
    border-radius:var(--radius);
    overflow:hidden;
    margin-bottom:16px;
  }
  .scope-card img{display:block; width:100%; height:auto; background:#000;}
  .scope-card .img-empty{
    aspect-ratio:16/10; display:flex; align-items:center; justify-content:center;
    color:var(--paper-dim); font-size:12px; flex-direction:column; gap:8px;
  }
  .scope-card .caption{padding:10px 14px; font-size:11px; color:var(--paper-dim); border-top:1px solid var(--line);}
 
  .prompt-title{
    font-family:'Fraunces', serif; font-style:italic; font-weight:500;
    font-size:20px; line-height:1.4; margin:0 0 16px;
    color:var(--paper);
  }
 
  .guess-grid{display:grid; gap:8px; margin-bottom:18px;}
  .guess-opt{
    text-align:left; background:var(--ink-800); border:1px solid var(--line); color:var(--paper);
    padding:13px 14px; border-radius:8px; font-size:13.5px; display:flex; align-items:center; gap:10px;
    transition:border-color .15s, background .15s;
  }
  .guess-opt:hover{border-color:var(--amber-dim);}
  .guess-opt .letter{
    font-size:11px; color:var(--paper-dim); border:1px solid var(--line); border-radius:5px;
    width:20px; height:20px; display:flex; align-items:center; justify-content:center; flex-shrink:0;
  }
  .guess-opt.correct{border-color:var(--teal); background:rgba(79,182,168,0.08);}
  .guess-opt.correct .letter{border-color:var(--teal); color:var(--teal);}
  .guess-opt.incorrect{border-color:var(--red); background:rgba(217,104,95,0.07); opacity:0.75;}
  .guess-opt.missed{border-color:var(--red); border-style:dashed; opacity:0.75;}
  .guess-opt.missed .letter{border-color:var(--red); color:var(--red);}
  .guess-opt.incorrect .letter{border-color:var(--red); color:var(--red);}
  .guess-opt.pending{border-color:var(--amber); background:rgba(232,162,61,0.08);}
  .guess-opt.pending .letter{border-color:var(--amber); color:var(--amber);}
  .guess-opt:disabled{cursor:default;}
 
  .free-text{margin-bottom:18px;}
  .free-text textarea{
    width:100%; background:var(--ink-800); border:1px solid var(--line); border-radius:8px; color:var(--paper);
    font-family:'JetBrains Mono', monospace; font-size:13px; padding:12px; resize:vertical; min-height:70px;
  }
  .free-text button{
    margin-top:8px; background:var(--amber); color:var(--ink-900); border:none; font-weight:700;
    font-size:12px; letter-spacing:0.5px; text-transform:uppercase; padding:10px 18px; border-radius:7px;
  }
 
  .reveal-toggle{
    width:100%; background:var(--ink-700); border:1px dashed var(--line); color:var(--amber);
    padding:14px; border-radius:8px; font-size:12px; letter-spacing:1px; text-transform:uppercase;
    margin-bottom:18px; display:flex; align-items:center; justify-content:center; gap:8px;
  }
  .reveal-toggle .chev{transition:transform .2s;}
  .reveal-toggle.open .chev{transform:rotate(180deg);}
 
  .interp{
    border-left:2px solid var(--amber); padding-left:16px; margin-bottom:24px;
    animation:sweep .5s ease;
  }
  @keyframes sweep{from{opacity:0; transform:translateX(-6px);} to{opacity:1; transform:translateX(0);}}
  .interp h3{
    font-family:'Fraunces', serif; font-size:13px; letter-spacing:0.5px; text-transform:uppercase;
    color:var(--amber); margin:0 0 6px;
  }
  .interp p{font-size:13.5px; line-height:1.65; color:#d6d4cc; margin:0 0 16px;}
  .interp .citation{font-size:11px; color:var(--paper-dim); border-top:1px solid var(--line); padding-top:10px;}
 
  .comments{border-top:1px solid var(--line); padding-top:18px; margin-bottom:30px;}
  .comments h3{font-size:12px; letter-spacing:1px; text-transform:uppercase; color:var(--paper-dim); margin:0 0 12px;}
  .comment{background:var(--ink-800); border:1px solid var(--line); border-radius:8px; padding:10px 12px; margin-bottom:8px;}
  .comment .who{font-size:11px; color:var(--teal); margin-bottom:4px; display:flex; justify-content:space-between;}
  .comment .who .when{color:var(--paper-dim);}
  .comment .body{font-size:13px; line-height:1.5; color:var(--paper);}
  .comment-form{display:flex; gap:8px; margin-top:10px;}
  .comment-form input[type=text]{
    background:var(--ink-800); border:1px solid var(--line); border-radius:7px; color:var(--paper);
    padding:9px 10px; font-size:12px; font-family:inherit; width:90px; flex-shrink:0;
  }
  .comment-form textarea{
    flex:1; background:var(--ink-800); border:1px solid var(--line); border-radius:7px; color:var(--paper);
    padding:9px 10px; font-size:13px; font-family:inherit; resize:none; min-height:38px;
  }
  .comment-form button{
    background:var(--amber); color:var(--ink-900); border:none; border-radius:7px; padding:0 14px;
    font-weight:700; font-size:11px; text-transform:uppercase;
  }
 
  /* Archive */
  .archive-grid{display:grid; gap:10px; padding-bottom:30px;}
  .archive-item{
    background:var(--ink-800); border:1px solid var(--line); border-radius:9px; padding:13px 14px;
    display:flex; gap:12px; align-items:center;
  }
  .archive-item .thumb{
    width:54px; height:40px; border-radius:5px; background:#000; flex-shrink:0; overflow:hidden;
    display:flex; align-items:center; justify-content:center; border:1px solid var(--line);
  }
  .archive-item .thumb img{width:100%; height:100%; object-fit:cover;}
  .archive-item .meta-col{flex:1; min-width:0;}
  .archive-item .meta-col .t{font-family:'Fraunces',serif; font-style:italic; font-size:14px; color:var(--paper); margin:0 0 3px;}
  .archive-item .meta-col .d{font-size:10.5px; color:var(--paper-dim);}
  .archive-item .arrow{color:var(--paper-dim); font-size:14px;}
 
  /* Upload (post a case) */
  .form-block{margin-bottom:18px;}
  .form-block label{display:block; font-size:11px; letter-spacing:0.8px; text-transform:uppercase; color:var(--paper-dim); margin-bottom:6px;}
  .form-block input[type=text], .form-block input[type=date], .form-block textarea, .form-block select{
    width:100%; background:var(--ink-800); border:1px solid var(--line); border-radius:8px; color:var(--paper);
    padding:11px 12px; font-family:inherit; font-size:13px;
  }
  .form-block textarea{resize:vertical; min-height:70px;}
  .form-row{display:grid; grid-template-columns:1fr 1fr; gap:10px;}
  .opt-row{display:flex; gap:8px; margin-bottom:8px; align-items:center;}
  .opt-row input[type=text]{flex:1;}
  .opt-row input[type=radio]{width:18px; height:18px; accent-color:var(--amber);}
  .add-opt{background:transparent; border:1px dashed var(--line); color:var(--paper-dim); border-radius:7px; padding:8px; font-size:11px; width:100%; margin-bottom:14px;}
  .upload-zone{
    border:1px dashed var(--line); border-radius:9px; padding:24px; text-align:center; color:var(--paper-dim);
    font-size:12px; margin-bottom:6px; cursor:pointer; position:relative;
  }
  .upload-zone.has-img{padding:0; border-style:solid;}
  .upload-zone img{width:100%; border-radius:9px; display:block;}
  .upload-zone input[type=file]{position:absolute; inset:0; opacity:0; cursor:pointer;}
  .publish-btn{
    width:100%; background:var(--amber); color:var(--ink-900); border:none; border-radius:9px; padding:14px;
    font-weight:700; font-size:13px; letter-spacing:0.5px; text-transform:uppercase; margin-top:6px;
  }
  .publish-btn:disabled{opacity:0.4;}
  .hint{font-size:11px; color:var(--paper-dim); line-height:1.5; margin-top:-2px; margin-bottom:14px;}
 
  .empty-state{text-align:center; padding:60px 20px; color:var(--paper-dim);}
  .empty-state .big{font-family:'Fraunces',serif; font-style:italic; font-size:18px; color:var(--paper); margin-bottom:8px;}
  .empty-state .small{font-size:12px; line-height:1.6;}
 
  .toast{
    position:fixed; bottom:20px; left:50%; transform:translateX(-50%);
    background:var(--ink-700); border:1px solid var(--amber-dim); color:var(--amber);
    padding:10px 18px; border-radius:8px; font-size:12px; z-index:50; opacity:0; transition:opacity .25s;
  }
  .toast.show{opacity:1;}
 
  .name-gate{
    display:flex; min-height:100vh; align-items:center; justify-content:center; padding:20px;
  }
  .name-gate .box{max-width:340px; width:100%; text-align:center;}
  .name-gate h2{font-family:'Fraunces',serif; font-style:italic; font-size:22px; margin-bottom:8px;}
  .name-gate p{font-size:12px; color:var(--paper-dim); margin-bottom:18px; line-height:1.6;}
  .name-gate input{
    width:100%; background:var(--ink-800); border:1px solid var(--line); border-radius:8px; color:var(--paper);
    padding:12px; font-size:13px; text-align:center; margin-bottom:10px; font-family:inherit;
  }
  .name-gate button{
    width:100%; background:var(--amber); color:var(--ink-900); border:none; border-radius:8px; padding:12px;
    font-weight:700; font-size:12px; text-transform:uppercase;
  }
 
  ::selection{background:var(--amber-dim);}
  :focus-visible{outline:2px solid var(--amber); outline-offset:2px;}
 
  @media (prefers-reduced-motion: reduce){
    *{animation:none !important; transition:none !important;}
  }
 
  #annBuilder{border:1px solid #2a3544;border-radius:8px;overflow:hidden;margin-top:8px;}
  #annBToolbar{background:#10161f;padding:0 8px;height:34px;display:flex;align-items:center;overflow:hidden;flex-shrink:0;border-bottom:1px solid #2a3544;}
  #annBTbi{display:flex;align-items:center;gap:3px;transform-origin:left center;white-space:nowrap;}
  .abtb{background:transparent;border:1px solid #2a3544;color:#9aa3b0;padding:0 7px;height:22px;border-radius:4px;cursor:pointer;font-size:9px;font-family:inherit;letter-spacing:.4px;text-transform:uppercase;outline:none;white-space:nowrap;display:inline-flex;align-items:center;flex-shrink:0;}
  .abtb:hover{border-color:#e8a23d;color:#e8a23d;}
  .abtb.on{border-color:#e8a23d;color:#e8a23d;background:rgba(232,162,61,0.07);}
  .abtb.red{color:#d9685f;}.abtb.red:hover{border-color:#d9685f;}
  .abtb.grn{color:#4fb6a8;border-color:#4fb6a8;}
  .absep{width:1px;height:14px;background:#2a3544;margin:0 1px;display:inline-block;flex-shrink:0;}
  .abdot{width:10px;height:10px;border-radius:50%;border:2px solid transparent;cursor:pointer;flex-shrink:0;display:inline-block;}
  .abdot.on{border-color:#fff;}
  #annBCanvas{position:relative;overflow:hidden;background:#050810;height:240px;}
  #annBCanvas canvas{position:absolute;top:0;left:0;touch-action:none;outline:none;}
  #annBStepList{max-height:130px;overflow-y:auto;padding:4px;}
  .abs-item{background:#171f2b;border:1px solid #2a3544;border-radius:4px;padding:4px 6px;margin-bottom:3px;font-size:9.5px;}
  .abs-item.on{border-color:#e8a23d;}
  .abs-n{font-size:8px;color:#e8a23d;text-transform:uppercase;margin-bottom:1px;}
  .abs-d{color:#9aa3b0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .abs-btns{display:flex;gap:2px;margin-top:3px;}
  .abs-btn{background:transparent;border:1px solid #2a3544;color:#9aa3b0;padding:0 4px;height:14px;border-radius:3px;cursor:pointer;font-size:7.5px;font-family:inherit;text-transform:uppercase;outline:none;flex:1;}
  .abs-btn:hover{border-color:#e8a23d;color:#e8a23d;}
  .abs-btn.r{color:#d9685f;}
  #annBForm{padding:6px;border-top:1px solid #2a3544;}
  #annBDesc{width:100%;background:#0a0e14;border:1px solid #2a3544;border-radius:4px;color:#e8e6df;padding:4px 6px;font-size:9.5px;font-family:inherit;resize:none;min-height:36px;outline:none;}
  #annBDesc:focus{border-color:#e8a23d;}
  .abs-save-row{display:flex;gap:4px;margin-top:4px;}
  .abs-save-btn{flex:1;background:rgba(232,162,61,0.12);border:1px solid #e8a23d;color:#e8a23d;padding:3px;border-radius:4px;cursor:pointer;font-size:8.5px;font-family:inherit;text-transform:uppercase;}
  .abs-new-btn{flex:1;background:transparent;border:1px solid #2a3544;color:#9aa3b0;padding:3px;border-radius:4px;cursor:pointer;font-size:8.5px;font-family:inherit;text-transform:uppercase;}
  .abs-new-btn:hover{border-color:#e8a23d;color:#e8a23d;}
  #annFinalSection{padding:6px;border-top:1px solid #2a3544;}
  #annFinalTxt{width:100%;background:#0a0e14;border:1px solid #2a3544;border-radius:4px;color:#e8e6df;padding:4px 6px;font-size:9.5px;font-family:inherit;resize:none;min-height:44px;outline:none;}
  #annFinalTxt:focus{border-color:#e8a23d;}
  #annBScaleBar{display:none;background:#171f2b;border-bottom:1px solid #2a3544;padding:0 8px;height:28px;align-items:center;gap:6px;font-size:9px;color:#9aa3b0;}
</style>
</head>
<body class="scope">
<div id="annOverlay" style="position:fixed;inset:0;background:#050810;z-index:1000;display:none;flex-direction:column;">
  <div id="annCanvasWrap" style="flex:1;position:relative;overflow:hidden;background:#050810;">
    <canvas id="annVC" style="position:absolute;top:0;left:0;"></canvas>
  </div>
  <div id="annBottom" style="background:#10161f;border-top:1px solid #2a3544;padding:10px 14px;flex-shrink:0;">
    <div id="annDesc" style="font-size:13px;color:#e8e6df;line-height:1.6;margin-bottom:8px;min-height:28px;"></div>
    <div id="annFinalText" style="font-size:13px;color:#e8e6df;line-height:1.6;margin-bottom:8px;white-space:pre-wrap;display:none;"></div>
    <div id="annNav" style="display:flex;align-items:center;gap:10px;">
      <button id="annPrev" style="background:#171f2b;color:#e8e6df;border:1px solid #2a3544;padding:7px 16px;border-radius:6px;cursor:pointer;font-size:11px;font-family:inherit;font-weight:700;text-transform:uppercase;" disabled>Prev</button>
      <span id="annProg" style="font-size:9.5px;color:#9aa3b0;flex:1;text-align:center;"></span>
      <button id="annNext" style="background:#e8a23d;color:#0a0e14;border:none;padding:7px 16px;border-radius:6px;cursor:pointer;font-size:11px;font-family:inherit;font-weight:700;text-transform:uppercase;">Next</button>
    </div>
  </div>
</div>
<div id="gate" class="name-gate" style="display:none;">
  <div class="box">
    <h2>EGM of the Day</h2>
    <p>Daily practice, one tracing at a time.<br>What's your name, for comments?</p>
    <input id="gateName" type="text" placeholder="Your name">
    <button id="gateBtn">Enter</button>
  </div>
</div>
 
<div id="app" style="display:none;">
<header class="top">
  <div class="brand">
    <span class="pulse"></span>
    <div>
      <h1>EGM of the Day</h1>
      <div class="tag">case archive</div>
    </div>
  </div>
  <nav class="tabs">
    <button data-tab="today" class="active">Today</button>
    <button data-tab="archive">Archive</button>
    <button data-tab="post">Post</button>
  </nav>
</header>
 
<main>
  <section id="tab-today"></section>
  <section id="tab-archive" style="display:none;"></section>
  <section id="tab-post" style="display:none;"></section>
</main>
</div>
 
<div id="toast" class="toast"></div>
 
<script>
(function(){
  const STORAGE_CASES_KEY = 'egm:cases-index'; // legacy
  const STORAGE_IDS_KEY = 'egm:cases-ids';
  const STORAGE_PASSCODE_KEY = 'egm:post-passcode';
  const SHARED = true; // all case + comment data is shared across the group
  let userName = '';
  let postPasscode = null; // null = no passcode set yet (open posting)
  let postUnlocked = false; // unlocked for this session once correct code entered
  let previewDraftId = null; // set when previewing a draft from the Post tab
  let cases = []; // [{id, date, title, image(base64), options:[{label,correct}], free, interp:{mechanism,evidence,management}, citation, comments:[]}]
  let currentTab = 'today';
  let currentCaseId = null;
 
  function toast(msg){
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(()=>t.classList.remove('show'), 2200);
  }
 
  function uid(){ return 'c_' + Date.now() + '_' + Math.random().toString(36).slice(2,7); }
 
  // Image compression settings — can be lowered if saves fail
  let imgMaxDim = 1600;
  let imgQuality = 0.92;
 
  // ---------- streak ----------
  const STREAK_WINDOW_MS = 72 * 60 * 60 * 1000; // 72 hours
 
  function getAnsweredIds(){
    try{ return JSON.parse(localStorage.getItem('egm:answered') || '[]'); }catch(e){ return []; }
  }
  function recordAnswered(caseId){
    const ids = getAnsweredIds();
    if(!ids.includes(caseId)){ ids.push(caseId); localStorage.setItem('egm:answered', JSON.stringify(ids)); }
  }
  function casePostedAt(c){
    // treat date as start of day in local time
    return new Date(c.date + 'T00:00:00').getTime();
  }
  function isWithinWindow(c){
    return Date.now() - casePostedAt(c) <= STREAK_WINDOW_MS;
  }
  function computeStreak(){
    const answeredIds = new Set(getAnsweredIds());
    const now = Date.now();
    const liveCases = cases.filter(isLive).sort((a,b)=> casePostedAt(a)-casePostedAt(b));
    let streak = 0;
    for(let i = liveCases.length-1; i >= 0; i--){
      const c = liveCases[i];
      const postedAt = casePostedAt(c);
      const withinWindow = (now - postedAt) <= STREAK_WINDOW_MS;
      if(answeredIds.has(c.id)){
        streak++;
      } else if(!withinWindow){
        // missed this case and window has passed — streak breaks here
        break;
      }
      // if within window and not answered yet, don't break — still has time
    }
    return streak;
  }
  function getStreakAtRiskCase(){
    // Find the OLDEST unanswered case within the 72hr window
    // (oldest = soonest deadline = most urgent threat to streak)
    const answeredIds = new Set(getAnsweredIds());
    const liveCases = cases.filter(isLive).sort((a,b)=> casePostedAt(a)-casePostedAt(b)); // oldest first
    let atRisk = null;
    for(const c of liveCases){
      const age = Date.now() - casePostedAt(c);
      if(!answeredIds.has(c.id) && isWithinWindow(c) && age > 24 * 60 * 60 * 1000){
        atRisk = c; // take the first (oldest) one found
        break;
      }
    }
    return atRisk;
  }
  function fmtTimeLeft(c){
    const msLeft = casePostedAt(c) + STREAK_WINDOW_MS - Date.now();
    if(msLeft <= 0) return '0 hours';
    const hoursLeft = Math.floor(msLeft / (60*60*1000));
    if(hoursLeft < 1) return 'less than 1 hour';
    if(hoursLeft < 24) return hoursLeft + ' hour' + (hoursLeft===1?'':'s');
    const daysLeft = Math.floor(hoursLeft/24);
    const remHrs = hoursLeft % 24;
    if(remHrs === 0) return daysLeft + ' day' + (daysLeft===1?'':'s');
    return daysLeft + 'd ' + remHrs + 'h';
  }

  function difficultyAverage(ratings){
    if(!ratings || Object.keys(ratings).length === 0) return null;
    const map = {easy:1, medium:2, hard:3};
    const rmap = ['','Easy','Medium','Hard'];
    const vals = Object.values(ratings).map(r=>map[r]).filter(Boolean);
    if(!vals.length) return null;
    const avg = vals.reduce((a,b)=>a+b,0)/vals.length;
    return rmap[Math.round(avg)];
  }
  // Drop-in replacement for Claude's window.storage API, backed by Cloudflare D1
  // via /api/storage for shared data, and plain localStorage for personal
  // (non-shared) data like the remembered display name.
  window.storage = {
    async get(key, shared){
      if(!shared){
        const v = localStorage.getItem('egmlocal:' + key);
        if(v === null) return null;
        return { key, value: v, shared: false };
      }
      const res = await fetch('/api/storage?key=' + encodeURIComponent(key));
      if(res.status === 404) return null;
      if(!res.ok) throw new Error('storage get failed');
      const data = await res.json();
      return { key: data.key, value: data.value, shared: true };
    },
    async set(key, value, shared){
      if(!shared){
        localStorage.setItem('egmlocal:' + key, value);
        return { key, value, shared: false };
      }
      console.log('[storage] set', key, 'length:', value.length);
      const res = await fetch('/api/storage', {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({key, value})
      });
      console.log('[storage] set response status:', res.status);
      if(!res.ok){
        const text = await res.text();
        console.error('[storage] set error:', res.status, text);
        if(text && text.includes('TOOBIG')){
          showCompressPrompt();
        }
        return null;
      }
      const data = await res.json();
      console.log('[storage] set success:', data.key);
      return { key: data.key, value: data.value, shared: true };
    },
    async delete(key, shared){
      if(!shared){
        localStorage.removeItem('egmlocal:' + key);
        return { key, deleted:true, shared:false };
      }
      const res = await fetch('/api/storage?key=' + encodeURIComponent(key), { method:'DELETE' });
      if(!res.ok) return null;
      return await res.json();
    },
    async list(prefix, shared){
      if(!shared){
        const keys = Object.keys(localStorage)
          .filter(k=>k.startsWith('egmlocal:' + (prefix||'')))
          .map(k=>k.replace('egmlocal:',''));
        return { keys, prefix, shared:false };
      }
      const res = await fetch('/api/storage/list?prefix=' + encodeURIComponent(prefix||''));
      if(!res.ok) return null;
      const data = await res.json();
      return { keys: data.keys, prefix, shared:true };
    }
  };
 
  // ---------- storage ----------
  async function loadCases(){
    try{
      const idsRes = await window.storage.get(STORAGE_IDS_KEY, SHARED);
      if(idsRes && idsRes.value){
        const ids = JSON.parse(idsRes.value);
        const loaded = [];
        for(const id of ids){
          try{
            const r = await window.storage.get('egm:case:' + id, SHARED);
            if(r && r.value){
              const cas = JSON.parse(r.value);
              // Strip any _ flags that may have been saved previously
              const dirtyKeys = Object.keys(cas).filter(k=>k.startsWith('_'));
              if(dirtyKeys.length){
                dirtyKeys.forEach(k=>delete cas[k]);
                // Re-save this case immediately to clean the DB
                try{ await window.storage.set('egm:case:' + id, JSON.stringify(cas), SHARED); }catch(e){}
              }
              loaded.push(cas);
            }
          }catch(e){}
        }
        cases = loaded;
      } else {
        const res = await window.storage.get(STORAGE_CASES_KEY, SHARED);
        if(res && res.value){
          cases = JSON.parse(res.value);
          console.log('[migrate] migrating', cases.length, 'cases');
          await saveCases();
          try{ await window.storage.delete(STORAGE_CASES_KEY, SHARED); }catch(e){}
        } else { cases = []; }
      }
    }catch(e){ cases = []; }
    cases.sort((a,b)=> new Date(b.date) - new Date(a.date));
    restoreDeviceState();
  }
  async function saveCases(){
    try{
      const ids = cases.map(c=>c.id);
      const idsR = await window.storage.set(STORAGE_IDS_KEY, JSON.stringify(ids), SHARED);
      if(!idsR){ toast('Save failed — try again'); return false; }
      let failed = 0;
      for(const cas of cases){
        try{
          // Strip per-device state before saving to shared DB
          const toSave = Object.fromEntries(
            Object.entries(cas).filter(([k])=>!k.startsWith('_'))
          );
          // Merge votes from DB to avoid overwriting votes added by other users
          try{
            const existing = await window.storage.get('egm:case:' + cas.id, SHARED);
            if(existing && existing.value){
              const existingCase = JSON.parse(existing.value);
              if(existingCase.votes){
                // Merge: take the max vote count per option to avoid losing votes
                const merged = {...(existingCase.votes)};
                if(toSave.votes){
                  Object.entries(toSave.votes).forEach(([k,v])=>{
                    merged[k] = Math.max(merged[k]||0, v);
                  });
                }
                toSave.votes = merged;
              }
            }
          }catch(e){}
          // Strip redundant imgSrc from annotationSteps (if matches case primary image)
          if(toSave.annotationSteps && toSave.images && toSave.images[0]){
            const primarySrc = toSave.images[0];
            toSave.annotationSteps = toSave.annotationSteps.map(s=>{
              if(s.imgSrc && s.imgSrc === primarySrc){ const {imgSrc,...rest}=s; return rest; }
              return s;
            });
          }
          const r = await window.storage.set('egm:case:' + cas.id, JSON.stringify(toSave), SHARED);
          if(!r) failed++;
        }catch(e){ failed++; }
      }
      if(failed > 0){ toast('Save failed for ' + failed + ' case(s)'); return false; }
      // Reset compression to high quality after successful save
      imgMaxDim = 1600; imgQuality = 0.92;
      try{
        const allKeys = await window.storage.list('egm:case:', SHARED);
        if(allKeys && allKeys.keys){
          const cur = new Set(ids);
          for(const key of allKeys.keys){
            const id = key.replace('egm:case:','');
            if(!cur.has(id)) await window.storage.delete(key, SHARED);
          }
        }
      }catch(e){}
      return true;
    }catch(e){ toast('Save failed — try again'); return false; }
  }

  function isLive(c){
    if(c.status === 'draft') return false;

  function pickTodaysCase(){
    if(cases.length === 0) return null;
    const today = todayStr();
    let live = cases.filter(isLive);
    let exact = live.find(c => c.date === today);
    if(exact) return exact;
    // most recent past case
    let past = live.filter(c => c.date <= today);
    if(past.length) return past[0];
    return live[live.length-1] || null;
  }

          <div style="background:rgba(79,182,168,0.08);border:1px solid var(--teal);border-radius:8px;padding:10px 14px;font-size:13px;color:var(--text);line-height:1.5;margin-bottom:8px;white-space:pre-wrap;">${escapeHtml(c._freeGuess)}</div>
          <div style="font-size:11px;color:var(--teal);letter-spacing:.5px;text-transform:uppercase;">✓ Answer submitted</div>
        </div>` : `
        <div class="free-text">
          <textarea id="freeGuess" placeholder="Your read — mechanism, key findings..."></textarea>
          <button id="freeSubmit">Lock in guess</button>
        </div>`) : ''}
      ${revealBtnHtml}
      <div id="interpBlock"></div>
      <div id="diffBlock"></div>
      <div style="margin:0 0 14px;padding:10px 14px;border-radius:8px;background:rgba(255,255,255,0.03);border:1px solid var(--line);">
        <p style="font-size:11px;color:#6a7585;line-height:1.6;margin:0;">Tracings and interpretations contributed by EP fellows in training. Not peer-reviewed — use the discussion below to flag errors or share your read.</p>
      </div>
      <div class="comments">
        <h3>Discussion (${(c.comments||[]).length})</h3>
        <div id="commentList"></div>
        <div class="comment-form">
          <input type="text" id="cName" value="${escapeHtml(userName)}" placeholder="Name">
          <textarea id="cBody" placeholder="Add a thought..."></textarea>
          <button id="cSend">Send</button>
        </div>
      </div>
    `;
 
    if(isPreviewing){
      el.querySelector('#exitPreview').addEventListener('click', ()=>{
        previewDraftId = null;
        currentCaseId = null;
        switchTab('post');
      });
    }
 
    if(showStreakBanner){
      el.querySelector('#dismissStreakBanner').addEventListener('click', ()=>{
        sessionStorage.setItem('egm:streak-banner-dismissed-' + atRiskCase.id, '1');
        el.querySelector('#streakBanner').remove();
      });
    }
 
    if(hasOptions){
      el.querySelectorAll('.guess-opt').forEach(btn=>{
        btn.addEventListener('click', ()=>{
          if(isSata){
            if(c._selectedOptions !== undefined) return;
            const idx = parseInt(btn.dataset.idx);
            c._pendingSata = c._pendingSata || [];
            const pos = c._pendingSata.indexOf(idx);
            if(pos>=0) c._pendingSata.splice(pos,1); else c._pendingSata.push(idx);
            if(!isPreviewing) setDeviceState(c.id,'pendingSata', c._pendingSata);
            renderToday();
          } else {
            if(c._answeredOption !== undefined) return;
            c._pendingOption = parseInt(btn.dataset.idx);
            if(!isPreviewing) setDeviceState(c.id,'pendingOption', c._pendingOption);
            renderToday();
          }
        });
      });
      const submitBtn = el.querySelector('#submitAnswer');
      if(submitBtn){
        submitBtn.addEventListener('click', async ()=>{
          if(isSata){
            if(c._selectedOptions !== undefined) return;
            const selected = c._pendingSata || [];
            if(selected.length===0){ toast('Select at least one option'); return; }
            c._selectedOptions = selected;
            delete c._pendingSata;
            if(!isPreviewing){
              setDeviceState(c.id,'selectedOptions', selected);
              setDeviceState(c.id,'pendingSata', null);
              c.votes = c.votes || {};
              selected.forEach(idx=>{ c.votes[idx] = (c.votes[idx]||0)+1; });
              if(interpAvailable(c)){ c._revealed=true; setDeviceState(c.id,'revealed',true); }
              recordAnswered(c.id);
              await saveCases();
            } else {
              if(interpAvailable(c)) c._revealed=true;
            }
          } else {
            if(c._answeredOption !== undefined || c._pendingOption === undefined) return;
            const idx = c._pendingOption;
            c._answeredOption = idx;
            delete c._pendingOption;
            if(!isPreviewing){
              setDeviceState(c.id,'answeredOption', idx);
              setDeviceState(c.id,'pendingOption', null);
            }
            if(!isPreviewing){
              c.votes = c.votes || {};
              c.votes[idx] = (c.votes[idx] || 0) + 1;
              if(interpAvailable(c)){ c._revealed = true; setDeviceState(c.id,'revealed',true); }
              recordAnswered(c.id);
              await saveCases();
            } else {
              if(interpAvailable(c)) c._revealed = true;
            }
          }
          renderToday();
        });
      }
    } else {
      const fs = el.querySelector('#freeSubmit');
      if(fs) fs.addEventListener('click', ()=>{
        const guess = el.querySelector('#freeGuess').value.trim();
        if(!guess){ toast('Add your read before locking in'); return; }
        c._freeGuess = guess;
        if(!isPreviewing) setDeviceState(c.id,'freeGuess', guess);
        if(!isPreviewing) recordAnswered(c.id);
        renderToday();
      });
    }
 
    renderInterp();
    renderDiff();
 
    const openCaliperBtn=el.querySelector('#openCaliperBtn');
    if(openCaliperBtn && c.scale && getImages(c).length){
      const cv2=el.querySelector('#caliperCV');
      const ctx2=cv2.getContext('2d');
      const scopeCard=el.querySelector('#scopeCard');
      let calActive=false, calAnns=[], calUndo2=[], calSel=null, calDrag=null, calPlacing=null, calIdn=5000;
      let calIR={x:0,y:0,w:1,h:1};
      const undoBtn=el.querySelector('#calUndoBtn'), clearBtn=el.querySelector('#calClearBtn'), statusEl=el.querySelector('#calStatus');
 
      function calSync(){
        // Match canvas pixel size to the scope-card element
        const r=scopeCard.getBoundingClientRect();
        cv2.width=Math.floor(r.width)||1;
        cv2.height=Math.floor(r.height)||1;
        // calIR covers the full canvas (images fill the card)
        calIR={x:0,y:0,w:cv2.width,h:cv2.height};
      }
      function calDraw(){
        const W=cv2.width,H=cv2.height;if(!W||!H)return;
        ctx2.clearRect(0,0,W,H);
        // Draw calipers — canvas is transparent over the images
        calAnns.forEach(a=>{try{annDraw(ctx2,a,a.id===calSel,calIR);}catch(e){}});
        if(calPlacing)try{annDraw(ctx2,calPlacing,false,calIR);}catch(e){}
      }
      function calHit(x,y){
        const R=calIR;
        for(let i=calAnns.length-1;i>=0;i--){
          const a=calAnns[i];
          const cx1=annPx(a.x1,R,'x'),cx2=annPx(a.x2||a.x1,R,'x'),by=annPx(a.barY||0.5,R,'y');
          const xmin=Math.min(cx1,cx2),xmax=Math.max(cx1,cx2);
          // Check bar first (move whole caliper) — wider hit area
          if(x>=xmin+14&&x<=xmax-14&&Math.abs(y-by)<20)return{id:a.id,p:'bar'};
          // Then arms (resize)
          if(Math.abs(x-cx1)<14)return{id:a.id,p:'l'};
          if(Math.abs(x-cx2)<14)return{id:a.id,p:'r'};
          // Bar edge fallback
          if(x>=xmin-4&&x<=xmax+4&&Math.abs(y-by)<20)return{id:a.id,p:'bar'};
        }return null;
      }
      function calGP(e){const r=cv2.getBoundingClientRect(),t=e.touches?e.touches[0]:e;return{x:t.clientX-r.left,y:t.clientY-r.top};}
 
      cv2.addEventListener('mousedown',e=>{
        e.preventDefault();cv2.focus();
        const{x,y}=calGP(e);const R=calIR;
        const fx=x/R.w,fy=y/R.h;
        const hit=calHit(x,y);
        if(hit){calSel=hit.id;const a=calAnns.find(a=>a.id===hit.id);calDrag={id:hit.id,p:hit.p,sx:x,sy:y,ox1:a.x1,ox2:a.x2||a.x1,oby:a.barY||0.5};}
        else{calSel=null;calPlacing={t:'cal',id:'p',x1:fx,x2:fx,barY:fy,c:ANN_COLS[0]};calDrag={t:'pl',sx:x,sy:y,ox2:fx};}
        calDraw();
      });
      cv2.addEventListener('mousemove',e=>{
        if(!calDrag){
          // Update cursor based on what's under pointer
          const{x,y}=calGP(e);
          const hit=calHit(x,y);
          if(hit){
            cv2.style.cursor=hit.p==='bar'?'move':(hit.p==='l'||hit.p==='r'?'ew-resize':'pointer');
          } else {
            cv2.style.cursor='crosshair';
          }
          return;
        }
        const{x,y}=calGP(e);const R=calIR;
        const dfx=(x-calDrag.sx)/R.w,dfy=(y-calDrag.sy)/R.h,cl=v=>Math.max(0,Math.min(1,v));
        if(calDrag.t==='pl'&&calPlacing){calPlacing.x2=calDrag.ox2+dfx;calPlacing.barY=cl((calDrag.sy/R.h)+dfy);}
        else if(calDrag.id){const a=calAnns.find(a=>a.id===calDrag.id);if(a){
          if(calDrag.p==='l')a.x1=calDrag.ox1+dfx;
          else if(calDrag.p==='r'){a.x2=calDrag.ox2+dfx;a.barY=cl(calDrag.oby+dfy);}
          else{a.barY=cl(calDrag.oby+dfy);a.x1=calDrag.ox1+dfx;a.x2=calDrag.ox2+dfx;}
          const pxW=Math.abs((a.x2-a.x1)*R.w);
          const msVal=Math.round(pxW/(c.scale*R.w));
          a.lbl=msVal+'ms';// update label live
          if(statusEl)statusEl.textContent=msVal+'ms';
        }}
        calDraw();
      });
      cv2.addEventListener('mouseup',()=>{
        if(calDrag&&calDrag.t==='pl'&&calPlacing){
          const R=calIR;
          if(Math.abs((calPlacing.x2-calPlacing.x1)*R.w)>5){
            calUndo2.push(JSON.parse(JSON.stringify(calAnns)));
            const a={...calPlacing,id:calIdn++};
            a.lbl=Math.round(Math.abs(a.x2-a.x1)/(c.scale))+'ms';
            calAnns.push(a);calSel=a.id;
          }
          calPlacing=null;
        }
        calDrag=null;calDraw();
      });
      cv2.addEventListener('touchstart',e=>{e.preventDefault();const t=e.touches[0];cv2.dispatchEvent(new MouseEvent('mousedown',{clientX:t.clientX,clientY:t.clientY}));},{passive:false});
      cv2.addEventListener('touchmove',e=>{e.preventDefault();const t=e.touches[0];cv2.dispatchEvent(new MouseEvent('mousemove',{clientX:t.clientX,clientY:t.clientY}));},{passive:false});
      cv2.addEventListener('touchend',()=>cv2.dispatchEvent(new MouseEvent('mouseup')));
      cv2.addEventListener('keydown',e=>{
        if((e.key==='Delete'||e.key==='Backspace')&&calSel){
          e.preventDefault();
          calUndo2.push(JSON.parse(JSON.stringify(calAnns)));
          calAnns=calAnns.filter(a=>a.id!==calSel);calSel=null;calDraw();
        }
      });
 
      if(undoBtn)undoBtn.addEventListener('click',()=>{if(calUndo2.length){calAnns=calUndo2.pop();calSel=null;calDraw();}});
      if(clearBtn)clearBtn.addEventListener('click',()=>{calUndo2.push(JSON.parse(JSON.stringify(calAnns)));calAnns=[];calSel=null;calDraw();});
 
      openCaliperBtn.addEventListener('click',()=>{
        calActive=!calActive;
        cv2.style.display=calActive?'block':'none';
        cv2.style.pointerEvents=calActive?'auto':'none';
        openCaliperBtn.textContent=calActive?'Hide calipers':'Use calipers';
        if(undoBtn)undoBtn.style.display=calActive?'inline-block':'none';
        if(clearBtn)clearBtn.style.display=calActive?'inline-block':'none';
        if(calActive){
          requestAnimationFrame(()=>{calSync();calDraw();cv2.focus();});
        }
      });
    }
 
    if(available){
      const revealBtn = el.querySelector('#revealBtn');
      if(revealBtn) revealBtn.addEventListener('click', ()=>{
        c._revealed = !c._revealed;
        setDeviceState(c.id,'revealed', c._revealed);
        renderToday();
      });
    }
 
    renderComments();
    el.querySelector('#cSend').addEventListener('click', async ()=>{
      const nameInput = el.querySelector('#cName').value.trim();
      const body = el.querySelector('#cBody').value.trim();
      if(!body) return;
      userName = nameInput || userName || 'Anonymous';
      c.comments = c.comments || [];
      c.comments.push({who:userName, body, ts:Date.now()});
      el.querySelector('#cBody').value = '';
      await saveCases();
      renderToday();
    });
 
    function renderInterp(){
      const block = el.querySelector('#interpBlock');
      if(!available || !c._revealed){ block.innerHTML=''; renderDiff(); return; }
      if(c.annotationSteps && c.annotationSteps.length && c.annotationSteps.some(s=>s.ann&&s.ann.length)){
        if(!c._annDone){
          // Show correct answer highlight first, then offer walkthrough button
          const hasInterp = !!(c.interp&&(c.interp.text||c.interp.images&&c.interp.images.length));
          block.innerHTML=`<div style="margin-bottom:12px;">
            <button id="startWalkthroughBtn" style="width:100%;background:var(--amber);color:#0a0e14;border:none;padding:10px;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;">
              Step-by-step EGM review →
            </button>
          </div>`;
          block.querySelector('#startWalkthroughBtn').addEventListener('click',()=>{
            startAnnViewer(c);
          });
          renderDiff(); return;
        }
        // _annDone: fall through to plain interp below, but add replay button
      }
      const i = c.interp || {};
      const hasInterpContent = !!(i.text || i.mechanism || i.evidence || i.management || i.image || (i.images && i.images.length));
      if(!hasInterpContent){ block.innerHTML=''; renderDiff(); return; }
      block.innerHTML = `
        <div class="interp">
          ${(i.text || i.mechanism || i.evidence || i.management) ? `<p style="white-space:pre-wrap;">${escapeHtml(i.text || [i.mechanism, i.evidence, i.management].filter(Boolean).join('\n\n'))}</p>` : ''}
          ${getInterpImages(c).map(src=>`<div style="margin:0 0 12px;border:1px solid var(--line);border-radius:8px;overflow:hidden;"><img src="${src}" style="display:block;width:100%;height:auto;" alt="Interpretation tracing"></div>`).join('')}
          ${(()=>{
            const links = c.links || (c.link ? [{label:'', url:c.link}] : []);
            const linksHtml = links.filter(l=>l.url).map(l=>
              `<a href="${escapeHtml(l.url)}" target="_blank" rel="noopener" style="color:var(--amber); display:inline-block; margin-right:12px;">${escapeHtml(l.label||'View reference')} ↗</a>`
            ).join('');
            if(c.citation && linksHtml) return `<div class="citation">Source / citation: ${escapeHtml(c.citation)}<br>${linksHtml}</div>`;
            if(c.citation) return `<div class="citation">Source / citation: ${escapeHtml(c.citation)}</div>`;
            if(linksHtml) return `<div class="citation">${linksHtml}</div>`;
            return '';
          })()}
        </div>
      `;
      // If annotation walkthrough was done, add replay button
      if(c._annDone && c.annotationSteps && c.annotationSteps.length && c.annotationSteps.some(s=>s.ann&&s.ann.length)){
        const replayDiv=document.createElement('div');
        replayDiv.style.cssText='margin-top:12px;';
        replayDiv.innerHTML='<button id="replayWalkthroughBtn" style="width:100%;background:transparent;color:var(--teal);border:1px solid var(--teal);padding:8px;border-radius:8px;font-size:12px;cursor:pointer;font-family:inherit;">Replay EGM review ↺</button>';
        replayDiv.querySelector('#replayWalkthroughBtn').addEventListener('click',()=>{
          c._annDone=false;
          renderToday();
        });
        block.appendChild(replayDiv);
      }
      renderDiff();
    }
 
    function shouldShowDiff(){
      if(isPreviewing) return false;
      if(hasOptions) return false; // multiple choice uses vote percentages instead
      return available && revealed;
    }
 
    function renderDiff(){
      const block = el.querySelector('#diffBlock');
      if(!block) return;
      if(!shouldShowDiff()){ block.innerHTML=''; return; }
      const myVote = getMyDifficultyVote(c.id);
      const avg = difficultyAverage(c.diffRatings);
      const total = c.diffRatings ? Object.keys(c.diffRatings).length : 0;
      const diffColors = {Easy:'var(--teal)', Medium:'var(--amber)', Hard:'var(--red)'};
      const btnStyle = (rating) => {
        const active = myVote === rating.toLowerCase();
        return 'padding:8px 16px; border-radius:7px; font-size:12px; font-family:inherit; cursor:pointer; ' +
          'border:1px solid ' + (active ? diffColors[rating] : 'var(--line)') + '; ' +
          'background:' + (active ? 'rgba(0,0,0,0.2)' : 'var(--ink-800)') + '; ' +
          'color:' + (active ? diffColors[rating] : 'var(--paper-dim)') + ';';
      };
      block.innerHTML = '<div style="border-top:1px solid var(--line); padding-top:16px; margin-bottom:20px;">' +
        '<div style="font-size:11px; letter-spacing:1px; text-transform:uppercase; color:var(--paper-dim); margin-bottom:10px;">How difficult was this case?</div>' +
        '<div style="display:flex; gap:8px; flex-wrap:wrap; align-items:center;">' +
        '<button class="diff-btn" data-rating="easy" style="' + btnStyle('Easy') + '">Easy</button>' +
        '<button class="diff-btn" data-rating="medium" style="' + btnStyle('Medium') + '">Medium</button>' +
        '<button class="diff-btn" data-rating="hard" style="' + btnStyle('Hard') + '">Hard</button>' +
        (avg && total > 0 ? '<span style="font-size:11px; color:' + diffColors[avg] + '; margin-left:8px;">' + avg + ' · ' + total + ' vote' + (total===1?'':'s') + '</span>' : '') +
        '</div></div>';
      block.querySelectorAll('.diff-btn').forEach(btn=>{
        btn.addEventListener('click', async ()=>{
          const rating = btn.dataset.rating;
          if(myVote === rating) return; // already voted this
          // remove old vote if changing
          if(myVote && c.diffRatings && c.diffRatings[userName+':'+c.id]){
            delete c.diffRatings[userName+':'+c.id];
          }
          c.diffRatings = c.diffRatings || {};
          const key = (userName||'anon') + ':' + c.id;
          c.diffRatings[key] = rating;
          recordDifficultyVote(c.id, rating);
          await saveCases();
          renderDiff();
        });
      });
    }
    function renderComments(){
      const list = el.querySelector('#commentList');
      const cm = c.comments || [];
      if(cm.length===0){ list.innerHTML = `<div class="hint">No comments yet — be the first.</div>`; return; }
      list.innerHTML = cm.slice().reverse().map(cmt=>`
        <div class="comment">
          <div class="who"><span>${escapeHtml(cmt.who)}</span><span class="when">${fmtWhen(cmt.ts)}</span></div>
          <div class="body">${escapeHtml(cmt.body)}</div>
        </div>
      `).join('');
    }
  }
 
  // ---------- render: archive ----------
  function renderArchive(){
    const el = document.getElementById('tab-archive');
    const liveCases = cases.filter(isLive);
    if(liveCases.length===0){
      el.innerHTML = `<div class="empty-state"><div class="big">Archive is empty</div><div class="small">Posted cases will appear here, newest first.</div></div>`;

      <div class="archive-item" data-id="${c.id}">

        <div class="meta-col">

          <div class="d">${fmtDate(c.date)}${!interpAvailable(c) ? ' · interpretation pending' : ''}${difficultyAverage(c.diffRatings) ? ' · ' + difficultyAverage(c.diffRatings) : ''}</div>

  // ---------- render: post ----------
  function renderPostLockScreen(mode){
    const el = document.getElementById('tab-post');
    if(mode === 'set'){
      el.innerHTML = `
        <div class="empty-state" style="padding:40px 16px;">
          <div class="big">Set a posting passcode</div>
          <div class="small" style="margin-bottom:18px;">No passcode exists yet. Set one now — anyone with this code will be able to publish cases. Share it only with colleagues you want posting.</div>
          <input type="text" id="newPasscode" placeholder="Choose a passcode" style="width:100%; background:var(--ink-800); border:1px solid var(--line); border-radius:8px; color:var(--paper); padding:11px 12px; font-family:inherit; font-size:13px; text-align:center; margin-bottom:10px;">
          <button class="publish-btn" id="setPasscodeBtn">Set passcode</button>
        </div>
      `;

        const v = el.querySelector('#newPasscode').value.trim();

        postUnlocked = true;
        toast('Passcode set');

    } else {
      el.innerHTML = `
        <div class="empty-state" style="padding:40px 16px;">
          <div class="big">Posting is locked</div>
          <div class="small" style="margin-bottom:18px;">Enter the group's posting passcode to publish a case.</div>
          <input type="text" id="enterPasscode" placeholder="Passcode" style="width:100%; background:var(--ink-800); border:1px solid var(--line); border-radius:8px; color:var(--paper); padding:11px 12px; font-family:inherit; font-size:13px; text-align:center; margin-bottom:10px;">
          <button class="publish-btn" id="checkPasscodeBtn">Unlock</button>
        </div>
      `;
      el.querySelector('#checkPasscodeBtn').addEventListener('click', ()=>{
        const v = el.querySelector('#enterPasscode').value.trim();
        if(v === postPasscode){
          postUnlocked = true;
          toast('Unlocked');
          renderPost();
        } else {

      });
      el.querySelector('#enterPasscode').addEventListener('keydown', (e)=>{
        if(e.key==='Enter') el.querySelector('#checkPasscodeBtn').click();
      });

  function renderPost(){
    if(postPasscode === null){
      renderPostLockScreen('set');
      return;
    }
    if(!postUnlocked){
      renderPostLockScreen('enter');
      return;
    }
    try{
    const el = document.getElementById('tab-post');
    const editId = el.dataset.editId || null; // case being edited, if any
    const editingCase = editId ? cases.find(c=>c.id===editId) : null;
    const subMode = el.dataset.subMode || 'new'; // 'new' or 'edit'
 
    const subNav = `
      <div style="display:flex; gap:6px; margin-bottom:10px;">
        <button id="subNew" class="add-opt" style="flex:1; ${subMode==='new'?'border-color:var(--amber); color:var(--amber);':''}">New case</button>
        <button id="subEdit" class="add-opt" style="flex:1; ${subMode==='edit'?'border-color:var(--amber); color:var(--amber);':''}">Add / edit interpretation</button>
      </div>
      <div style="display:flex; gap:6px; margin-bottom:18px;">
        <button id="backupBtn" class="add-opt" style="flex:1; color:var(--teal); border-color:var(--teal);">⬇ Download backup</button>
        <button id="importBtn" class="add-opt" style="flex:1; color:var(--teal); border-color:var(--teal); position:relative;">
          ⬆ Import backup
          <input type="file" id="importFile" accept="application/json,.json" style="position:absolute; inset:0; opacity:0; cursor:pointer;">
        </button>
      </div>
    `;
 
    if(subMode === 'edit'){
      renderEditPicker();
      return;
    }
 
    el.innerHTML = subNav + `
      <div class="form-block">
        <label>Date</label>
        <input type="date" id="pDate" value="${todayStr()}">
      </div>
      <div class="form-block" id="pImagesBlock">
        <label>EGM tracing</label>
        <div class="hint">Upload one or more images of the tracing.</div>

  function convertToJpeg(file){
    return new Promise((resolve)=>{
      // Detect HEIC by MIME type or file extension
      const isHeic = file.type === 'image/heic' || file.type === 'image/heif' ||
                     file.name.toLowerCase().endsWith('.heic') || file.name.toLowerCase().endsWith('.heif');
 
      const reader = new FileReader();
      reader.onload = ()=>{
        const dataUrl = reader.result;
        // Try canvas conversion via blob URL (most reliable cross-browser path)
        const byteStr = atob(dataUrl.split(',')[1]);
        const ab = new ArrayBuffer(byteStr.length);
        const ia = new Uint8Array(ab);
        for(let i=0;i<byteStr.length;i++) ia[i]=byteStr.charCodeAt(i);
        const blob = new Blob([ab], {type: file.type || 'image/jpeg'});
        const blobUrl = URL.createObjectURL(blob);
        const img = new Image();
        img.onload = ()=>{
          try{
            const MAX_DIM = imgMaxDim;
            let iw = img.naturalWidth, ih = img.naturalHeight;
            if(iw === 0 || ih === 0){
              URL.revokeObjectURL(blobUrl);
              if(isHeic) toast('⚠ HEIC detected — please export as JPEG from Photos first');
              resolve(dataUrl);
              return;
            }
            if(iw > MAX_DIM || ih > MAX_DIM){
              if(iw > ih){ ih = Math.round(ih * MAX_DIM / iw); iw = MAX_DIM; }
              else { iw = Math.round(iw * MAX_DIM / ih); ih = MAX_DIM; }
            }
            const canvas = document.createElement('canvas');
            canvas.width = iw; canvas.height = ih;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#000';
            ctx.fillRect(0,0,iw,ih);
            ctx.drawImage(img,0,0,iw,ih);
            const jpeg = canvas.toDataURL('image/jpeg', imgQuality);
            URL.revokeObjectURL(blobUrl);
            resolve(jpeg.length > 5000 ? jpeg : dataUrl);
          }catch(e){
            URL.revokeObjectURL(blobUrl);
            if(isHeic) toast('⚠ HEIC detected — please export as JPEG from Photos first');
            resolve(dataUrl);
          }
        };
        img.onerror = ()=>{
          URL.revokeObjectURL(blobUrl);
          if(isHeic) toast('⚠ HEIC image could not be converted — export as JPEG from Photos first');
          resolve(dataUrl);
        };
        img.src = blobUrl;
      };
      reader.readAsDataURL(file);
    });
  }
 
  function downloadBackup(){
    try{
      const payload = {
        exportedAt: new Date().toISOString(),
        app: 'EGM of the Day',
        caseCount: cases.length,
        cases: cases
      };
      const blob = new Blob([JSON.stringify(payload, null, 2)], {type:'application/json'});
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      const stamp = todayStr();
      a.href = url;
      a.download = `egm-backup-${stamp}.json`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      setTimeout(()=>URL.revokeObjectURL(url), 2000);

  function importBackupFile(file, onDone){
    if(!file) return;
    const reader = new FileReader();
    reader.onload = async ()=>{
      try{
        const parsed = JSON.parse(reader.result);
        const incoming = Array.isArray(parsed) ? parsed : parsed.cases;
        if(!Array.isArray(incoming)) throw new Error('No cases array found in file');
        const existingIds = new Set(cases.map(c=>c.id));
        let added = 0, skipped = 0;
        incoming.forEach(c=>{
          if(c && c.id && !existingIds.has(c.id)){
            cases.push(c);
            existingIds.add(c.id);
            added++;
          } else {
            skipped++;
          }
        });
        cases.sort((a,b)=> new Date(b.date) - new Date(a.date));
        await saveCases();
        toast(`Imported ${added} case${added===1?'':'s'}${skipped?`, skipped ${skipped} duplicate${skipped===1?'':'s'}`:''}`);
        if(onDone) onDone();
      }catch(e){
        toast('Import failed — not a valid backup file');
      }
    };
    reader.readAsText(file);
  }

  function annImgRect(imgEl,w,h){

  function annCal(c,a,col,isSel,R){

      if(drag.p==='r'){cal.x2=drag.ox2+dfx;cal.by=cy(drag.oby+dfy);}

    },80);
  }

          bctx.save();bctx.globalAlpha=0.8;bctx.setLineDash([6,4]);bctx.strokeStyle='#e8a23d';bctx.lineWidth=1.5;
          const sx1=annPx(bScaleCal.x1,bIR,'x'),sx2=annPx(bScaleCal.x2||bScaleCal.x1,bIR,'x'),sby=annPx(bScaleCal.by||0.5,bIR,'y');
          bctx.beginPath();bctx.moveTo(sx1,bIR.y);bctx.lineTo(sx1,bIR.y+bIR.h);bctx.stroke();
          if(Math.abs(sx2-sx1)>2){bctx.beginPath();bctx.moveTo(sx2,bIR.y);bctx.lineTo(sx2,bIR.y+bIR.h);bctx.stroke();}
          bctx.beginPath();bctx.moveTo(sx1,sby);bctx.lineTo(sx2,sby);bctx.stroke();
          bctx.setLineDash([]);bctx.restore();
        }
      }
    }

    function bHit(px,py){
      // Refresh bIR in case canvas was resized
      bIR=annImgRect(bImg,bc.width,bc.height);
      const R=bIR;
      for(let i=bActiveAnn.length-1;i>=0;i--){
        const a=bActiveAnn[i];
        // Move handle (center)
        if(a.t==='arrow'||a.t==='circ'){
          let cx,cy;if(a.t==='arrow'){cx=annPx((a.tx+a.x1)/2,R,'x');cy=annPx((a.ty+a.y1)/2,R,'y');}
          else{cx=annPx((a.x1+a.x2)/2,R,'x');cy=annPx((a.y1+a.y2)/2,R,'y');}
          if(Math.hypot(px-cx,py-cy)<14)return{id:a.id,p:'mv'};
        }
        if(a.t==='arrow'){
          const tx=annPx(a.tx,R,'x'),ty=annPx(a.ty,R,'y'),x1=annPx(a.x1,R,'x'),y1=annPx(a.y1,R,'y');
          if(Math.hypot(px-tx,py-ty)<ANN_AH)return{id:a.id,p:'tip'};
          if(Math.hypot(px-x1,py-y1)<ANN_AH)return{id:a.id,p:'tail'};
          // Hit anywhere along arrow shaft
          const len=Math.hypot(tx-x1,ty-y1);
          if(len>2){const t=((px-x1)*(tx-x1)+(py-y1)*(ty-y1))/(len*len);const tc=Math.max(0,Math.min(1,t));const dx=px-(x1+tc*(tx-x1)),dy=py-(y1+tc*(ty-y1));if(Math.hypot(dx,dy)<10)return{id:a.id,p:'mv'};}
        }
        if(a.t==='circ'){
          const x1=annPx(a.x1,R,'x'),y1=annPx(a.y1,R,'y'),x2=annPx(a.x2,R,'x'),y2=annPx(a.y2,R,'y');
          if(Math.hypot(px-x1,py-y1)<ANN_AH)return{id:a.id,p:'p1'};
          if(Math.hypot(px-x2,py-y2)<ANN_AH)return{id:a.id,p:'p2'};
          // Hit ellipse perimeter
          const cx=(x1+x2)/2,cy=(y1+y2)/2,rx=Math.abs(x2-x1)/2||2,ry=Math.abs(y2-y1)/2||2;
          const norm=Math.hypot((px-cx)/rx,(py-cy)/ry);
          if(norm>0.6&&norm<1.5)return{id:a.id,p:'mv'};
        }
        if(a.t==='cal'){const cx1=annPx(a.x1,R,'x'),cx2=annPx(a.x2||a.x1,R,'x'),by=annPx(a.barY||0.5,R,'y');if(Math.abs(px-cx1)<ANN_AH)return{id:a.id,p:'l'};if(Math.abs(px-cx2)<ANN_AH)return{id:a.id,p:'r'};if(px>=Math.min(cx1,cx2)-4&&px<=Math.max(cx1,cx2)+4&&Math.abs(py-by)<ANN_BH)return{id:a.id,p:'bar'};}
      }return null;
    }
    function bGP(e){const r=bc.getBoundingClientRect(),t=e.touches?e.touches[0]:e;return{x:t.clientX-r.left,y:t.clientY-r.top};}
    function bPD(e){
      e.preventDefault();bc.focus();
      const{x,y}=bGP(e);const R=bIR;const fx=(x-R.x)/R.w,fy=(y-R.y)/R.h;
      if(bScaleMode){
        if(!bScaleCal){bScaleCal={x1:fx,x2:fx,by:fy};bDrag={t:'sc',p:'r',sx:x,sy:y,ox1:fx,ox2:fx,oby:fy};}
        else{const cx1=annPx(bScaleCal.x1,bIR,'x'),cx2=annPx(bScaleCal.x2||bScaleCal.x1,bIR,'x');
          if(Math.abs(x-cx1)<14)bDrag={t:'sc',p:'l',sx:x,sy:y,ox1:bScaleCal.x1,ox2:bScaleCal.x2||bScaleCal.x1,oby:bScaleCal.by||0.5};
          else if(Math.abs(x-cx2)<14)bDrag={t:'sc',p:'r',sx:x,sy:y,ox1:bScaleCal.x1,ox2:bScaleCal.x2||bScaleCal.x1,oby:bScaleCal.by||0.5};
          else bDrag={t:'sc',p:'bar',sx:x,sy:y,ox1:bScaleCal.x1,ox2:bScaleCal.x2||bScaleCal.x1,oby:bScaleCal.by||0.5};}
        bDraw();return;
      }
      const hit=bHit(x,y);
      if(hit){bSel=hit.id;bc.focus();const a=bActiveAnn.find(a=>a.id===hit.id);bDrag={t:'ed',id:hit.id,p:hit.p,sx:x,sy:y,ox1:a.x1,ox2:a.x2,oy1:a.y1,oy2:a.y2,otx:a.tx,oty:a.ty,oby:a.barY||0.5};}
      else{bSel=null;if(bTool==='arrow'){bPlacing={t:'arrow',id:'p',tx:fx,ty:fy,x1:fx,y1:fy,c:bCol};bDrag={t:'pl',sx:x,sy:y};}
        else if(bTool==='circle'){bPlacing={t:'circ',id:'p',x1:fx,y1:fy,x2:fx,y2:fy,c:bCol};bDrag={t:'pl',sx:x,sy:y};}
        else if(bTool==='cal'){bPlacing={t:'cal',id:'p',x1:fx,x2:fx,barY:fy,c:bCol,scl:caseObj.scale||null};bDrag={t:'pl',sx:x,sy:y,ox2:fx};}}
      bUpdateLblBar();bDraw();
    }
    function bPM(e){
      e.preventDefault();const{x,y}=bGP(e);if(!bDrag)return;
      const R=bIR,dfx=(x-bDrag.sx)/R.w,dfy=(y-bDrag.sy)/R.h,clamp=v=>Math.max(0,Math.min(1,v));
      if(bDrag.t==='sc'&&bScaleCal){
        if(bDrag.p==='r'){bScaleCal.x2=bDrag.ox2+dfx;bScaleCal.by=clamp(bDrag.oby+dfy);}
        else if(bDrag.p==='l')bScaleCal.x1=bDrag.ox1+dfx;
        else{bScaleCal.by=clamp(bDrag.oby+dfy);bScaleCal.x1=bDrag.ox1+dfx;bScaleCal.x2=bDrag.ox2+dfx;}
        bDraw();return;
      }
      if(bDrag.t==='pl'&&bPlacing){
        const fx=(x-R.x)/R.w,fy=(y-R.y)/R.h;
        if(bPlacing.t==='arrow'){bPlacing.x1=fx;bPlacing.y1=fy;}
        else if(bPlacing.t==='circ'){bPlacing.x2=fx;bPlacing.y2=fy;}
        else if(bPlacing.t==='cal'){bPlacing.x2=bDrag.ox2+dfx;bPlacing.barY=clamp((bDrag.sy-R.y)/R.h+dfy);}
        bDraw();return;
      }
      if(bDrag.t==='ed'){
        const a=bActiveAnn.find(a=>a.id===bDrag.id);if(!a)return;
        if(a.t==='arrow'){if(bDrag.p==='tip'){a.tx=bDrag.otx+dfx;a.ty=bDrag.oty+dfy;}else if(bDrag.p==='tail'){a.x1=bDrag.ox1+dfx;a.y1=bDrag.oy1+dfy;}else if(bDrag.p==='mv'){a.tx=bDrag.otx+dfx;a.ty=bDrag.oty+dfy;a.x1=bDrag.ox1+dfx;a.y1=bDrag.oy1+dfy;}}
        else if(a.t==='circ'){if(bDrag.p==='p1'){a.x1=bDrag.ox1+dfx;a.y1=bDrag.oy1+dfy;}else if(bDrag.p==='p2'){a.x2=bDrag.ox2+dfx;a.y2=bDrag.oy2+dfy;}else if(bDrag.p==='mv'){a.x1=bDrag.ox1+dfx;a.y1=bDrag.oy1+dfy;a.x2=bDrag.ox2+dfx;a.y2=bDrag.oy2+dfy;}}
        else if(a.t==='cal'){if(bDrag.p==='l')a.x1=bDrag.ox1+dfx;else if(bDrag.p==='r'){a.x2=bDrag.ox2+dfx;a.barY=clamp(bDrag.oby+dfy);}else if(bDrag.p==='bar'){a.barY=clamp(bDrag.oby+dfy);a.x1=bDrag.ox1+dfx;a.x2=bDrag.ox2+dfx;}}
        bDraw();
      }
    }
    function bPU(){
      if(bDrag&&bDrag.t==='pl'&&bPlacing){
        const R=bIR;let ok=false;
        if(bPlacing.t==='arrow')ok=Math.hypot((bPlacing.x1-bPlacing.tx)*R.w,(bPlacing.y1-bPlacing.ty)*R.h)>5;
        else if(bPlacing.t==='circ')ok=Math.hypot((bPlacing.x2-bPlacing.x1)*R.w,(bPlacing.y2-bPlacing.y1)*R.h)>5;
        else if(bPlacing.t==='cal')ok=Math.abs((bPlacing.x2-bPlacing.x1)*R.w)>5;
        if(ok){bUndo.push(JSON.parse(JSON.stringify(bActiveAnn)));const a={...bPlacing,id:bIdn++};bActiveAnn.push(a);bSel=a.id;if(bInFinal)bFinalAnn=bActiveAnn;else bSteps[bCurI].ann=bActiveAnn;}
        bPlacing=null;
      }
      bDrag=null;bUpdateLblBar();bDraw();
    }
    bc.addEventListener('mousedown',bPD);
    bc.addEventListener('mousemove',e=>{if(!bDrag){const{x,y}=bGP(e);const h=bHit(x,y);bc.style.cursor=h?(h.p==='mv'?'move':'pointer'):'crosshair';}bPM(e);});
    bc.addEventListener('mouseup',bPU);
    bc.addEventListener('touchstart',bPD,{passive:false});bc.addEventListener('touchmove',bPM,{passive:false});bc.addEventListener('touchend',bPU);
    bc.addEventListener('keydown',e=>{
      if(document.activeElement.tagName==='TEXTAREA')return;
      if((e.key==='Delete'||e.key==='Backspace')&&bSel){e.preventDefault();bUndo.push(JSON.parse(JSON.stringify(bActiveAnn)));bActiveAnn=bActiveAnn.filter(a=>a.id!==bSel);if(bInFinal)bFinalAnn=bActiveAnn;else bSteps[bCurI].ann=bActiveAnn;bSel=null;bUpdateLblBar();bDraw();}
      if((e.key==='m'||e.key==='M')&&bSel){const a=bActiveAnn.find(a=>a.id===bSel&&a.t==='cal');if(a){bUndo.push(JSON.parse(JSON.stringify(bActiveAnn)));a.march=!a.march;bDraw();}}
    });
    // Document-level fallback for delete when canvas may not have focus
    const bDocKey=e=>{
      if(document.activeElement.tagName==='TEXTAREA'||document.activeElement.tagName==='INPUT')return;
      if(!bSel)return;
      if(e.key==='Delete'||e.key==='Backspace'){e.preventDefault();bUndo.push(JSON.parse(JSON.stringify(bActiveAnn)));bActiveAnn=bActiveAnn.filter(a=>a.id!==bSel);if(bInFinal)bFinalAnn=bActiveAnn;else bSteps[bCurI].ann=bActiveAnn;bSel=null;bDraw();}
    };
    document.addEventListener('keydown',bDocKey);
    // Clean up when builder is destroyed (container removed)
    const bObserver=new MutationObserver(()=>{ if(!document.contains(bc)){ document.removeEventListener('keydown',bDocKey); bObserver.disconnect(); } });
    bObserver.observe(document.body,{childList:true,subtree:true});
 
    function bSaveCur(){if(bInFinal||bCurI>=bSteps.length)return;bSteps[bCurI].ann=JSON.parse(JSON.stringify(bActiveAnn));bSteps[bCurI].desc=container.querySelector('#annBDesc').value;bSteps[bCurI].imgSrc=bImg?bImgSrc:null;bAutoFill();bRenderList();}
    function bLoadStep(i){
      bCurI=i;bActiveAnn=JSON.parse(JSON.stringify(bSteps[i].ann||[]));
      container.querySelector('#annBDesc').value=bSteps[i].desc||'';

      const stepSrc=bSteps[i].imgSrc;
      const caseSrc=getImages(caseObj)[0]||null;
      const src=stepSrc||caseSrc;
      if(src){
        if(src===bImgSrc&&bImg){bDraw();}// already loaded
        else{const im=new Image();im.onload=()=>{bImg=im;bImgSrc=src;bDraw();};im.src=src;}
      } else {bImg=null;bImgSrc=null;bDraw();}

    }
    function bAutoFill(){const t=bSteps.map(s=>s.desc||'').filter(Boolean).join('\n\n');if(!caseObj._annFinalSaved){container.querySelector('#annFinalTxt').value=t;}}
    function bRenderList(){
      const list=container.querySelector('#annBStepList');list.innerHTML='';

          '<button class="abs-btn" data-i="'+i+'" data-a="u">\u2191</button>'+
          '<button class="abs-btn" data-i="'+i+'" data-a="d">\u2193</button>'+

        list.appendChild(d);
      });
      list.querySelectorAll('.abs-btn').forEach(b=>{

          else if(act==='d'&&i<bSteps.length-1){[bSteps[i],bSteps[i+1]]=[bSteps[i+1],bSteps[i]];if(bCurI===i)bCurI=i+1;else if(bCurI===i+1)bCurI=i;bRenderList();}

      return{annotationSteps:steps,finalAnn:bFinalAnn,finalText:ftxtEl?ftxtEl.value:'',showFinalView:container.querySelector('#annShowFinal').checked};
    };
    bc._bResize=bResize;bc._bLoadImg=bLoadCaseImg;
    bLoadStep(0);bBuildTb();// bLoadStep populates textarea + annotations for step 0
  }
 
})();
 
  // ═══════════════════════════════════════════════════════
</script>
